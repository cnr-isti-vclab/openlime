sform, viewport); for(let layer of this.layers) if(layer.status != 'ready') return false; if(!this.shader) throw \"Shader not specified!\"; let gl = this.gl; // Draw on a restricted viewport around the lens, to lower down the number of required tiles let lensViewport = this.getLensViewport(transform, viewport); // If an overlay is present, merge its viewport with the lens one let overlayViewport = this.getOverlayLayerViewport(transform, viewport); if (overlayViewport != null) { lensViewport = this.joinViewports(lensViewport, overlayViewport); } gl.viewport(lensViewport.x, lensViewport.y, lensViewport.dx, lensViewport.dy); // Keep the framwbuffer to the window size in order to avoid changing at each scale event if(!this.framebuffers.length || this.layout.width != viewport.w || this.layout.height != viewport.h) { this.deleteFramebuffers(); this.layout.width = viewport.w; this.layout.height = viewport.h; this.createFramebuffers(); } var b = [0, 0, 0, 0]; gl.clearColor(b[0], b[1], b[2], b[3]); // Draw the layers only within the viewport enclosing the lens for(let i = 0; i &lt; this.layers.length; i++) { gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffers[i]); gl.clear(gl.COLOR_BUFFER_BIT); this.layers[i].draw(transform, lensViewport); gl.bindFramebuffer(gl.FRAMEBUFFER, null); } // Set in the lensShader the proper lens position wrt the window viewport const vl = this.getLensInViewportCoords(transform, viewport); this.shader.setLensUniforms(vl, [viewport.w, viewport.h], this.getBorderColor(), this.borderEnable); this.prepareWebGL(); // Bind all textures and combine them with the shaderLens for(let i = 0; i &lt; this.layers.length; i++) { gl.uniform1i(this.shader.samplers[i].location, i); gl.activeTexture(gl.TEXTURE0 + i); gl.bindTexture(gl.TEXTURE_2D, this.textures[i]); } // Get texture coords of the lensViewport with respect to the framebuffer sz const lx = lensViewport.x/lensViewport.w; const ly = lensViewport.y/lensViewport.h; const hx = (lensViewport.x+lensViewport.dx)/lensViewport.w; const hy = (lensViewport.y+lensViewport.dy)/lensViewport.h; this.updateTileBuffers( new Float32Array([-1, -1, 0, -1, 1, 0, 1, 1, 0, 1, -1, 0]), new Float32Array([ lx, ly, lx, hy, hx, hy, hx, ly])); gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT,0); // Restore old viewport gl.viewport(viewport.x, viewport.x, viewport.dx, viewport.dy); return done; } getLensViewport(transform, viewport) { const lensC = this.getCurrentCenter(); const l = CoordinateSystem.fromSceneToViewport(lensC, this.camera, this.useGL); const r = this.getRadius() * transform.z; return {x: Math.floor(l.x-r)-1, y: Math.floor(l.y-r)-1, dx: Math.ceil(2*r)+2, dy: Math.ceil(2*r)+2, w:viewport.w, h:viewport.h}; } getOverlayLayerViewport(transform, viewport) { let result = null; if (this.layers.length == 2) { // Get overlay projected viewport let bbox = this.layers[1].boundingBox(); const p0v = CoordinateSystem.fromSceneToViewport({x:bbox.xLow, y:bbox.yLow}, this.camera, this.useGL); const p1v = CoordinateSystem.fromSceneToViewport({x:bbox.xHigh, y:bbox.yHigh}, this.camera, this.useGL); // Intersect with window viewport const x0 = Math.min(Math.max(0, Math.floor(p0v.x)), viewport.w); const y0 = Math.min(Math.max(0, Math.floor(p0v.y)), viewport.h); const x1 = Math.min(Math.max(0, Math.ceil(p1v.x)), viewport.w); const y1 = Math.min(Math.max(0, Math.ceil(p1v.y)), viewport.h); const width = x1 - x0; const height = y1 - y0; result = {x: x0, y: y0, dx:width, dy: height, w:viewport.w, h:viewport.h}; } return result; } joinViewports(v0, v1) { const xm = Math.min(v0.x, v1.x); const xM = Math.max(v0.x+v0.dx, v1.x+v1.dx); const ym = Math.min(v0.y, v1.y); const yM = Math.max(v0.y+v0.dy, v1.y+v1.dy); const width = xM - xm; const height = yM - ym; return {x:xm, y:ym, dx:width, dy:height, w: v0.w, h: v0.h }; } getLensInViewportCoords(transform, viewport) { const lensC = this.getCurrentCenter(); const c = CoordinateSystem.fromSceneToViewport(lensC, this.camera, this.useGL); const r = this.getRadius(); return [c.x, c.y, r * transform.z, this.getBorderWidth()]; } } Layer.prototype.types['lens'] = (options) =&gt; { return new LayerLens(options); } export {LayerLens} × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"LayerRTI.js.html":{"id":"LayerRTI.js.html","title":"Source: LayerRTI.js","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Source: LayerRTI.js import { Layer } from './Layer.js' import { Raster } from './Raster.js' import { ShaderRTI } from './ShaderRTI.js' import { Transform } from './Transform.js' /** * Extends {@link Layer}, and can display a relightable images (RTI) using the 'relight' data format (see: * [relight on github]{@link https://github.com/cnr-isti-vclab/relight} for details). * This web-friendly format is composed of a info.json with RTI parametets and a set of images * (plane_0.jpg, plane_1.jpg etc.) with encoded coefficients. * As with all other layers Deepzoom and other {@link Layout}s can be used. * * The ligh direction can be changed programmatically using setLight. * * @param {options} options Same as {@link Layer}, but url and layout are required. * **url**: points to a relight .json * **layout**: one of image, deepzoom, google, iiif, zoomify, tarzoom, itarzoom */ class LayerRTI extends Layer { constructor(options) { super(options); if(Object.keys(this.rasters).length != 0) throw \"Rasters options should be empty!\"; if(!this.url) throw \"Url option is required\"; this.shaders['rti'] = new ShaderRTI({ normals: this.normals }); this.setShader('rti'); this.addControl('light', [0, 0]); this.worldRotation = 0; //if the canvas or ethe layer rotate, light direction neeeds to be rotated too. this.loadJson(this.url); } /* * Internal function to assemble the url needed to retrieve the image or the image tile. */ imageUrl(url, plane) { let path = this.url.substring(0, this.url.lastIndexOf('/')+1); switch(this.layout.type) { case 'image': return path + plane + '.jpg'; break; case 'google': return path + plane; break; case 'deepzoom': return path + plane + '.dzi'; break; case 'tarzoom': return path + plane + '.tzi'; break; case 'itarzoom': return path + 'planes.tzi'; break; case 'zoomify': return path + plane + '/ImageProperties.xml'; break; //case 'iip': return this.plane.throw Error(\"Unimplemented\"); case 'iiif': throw Error(\"Unimplemented\"); default: throw Error(\"Unknown layout: \" + layout.type); } } /* * Alias for setControl, changes light direction. * @param {Array} light light direction as an array [x, y] * @param {number} dt in ms, interpolation duration. */ setLight(light, dt) { this.setControl('light', light, dt); } loadJson(url) { (async () =&gt; { var response = await fetch(this.url); if(!response.ok) { this.status = \"Failed loading \" + this.url + \": \" + response.statusText; return; } let json = await response.json(); this.shader.init(json); let urls = []; for(let p = 0; p &lt; this.shader.njpegs; p++) { let url = this.layout.imageUrl(this.url, 'plane_' + p); urls.push(url); let raster = new Raster({ format: 'vec3'}); this.rasters.push(raster); } if(this.normals) { // ITARZOOM must include normals and currently has a limitation: loads the entire tile let url = this.layout.imageUrl(this.url, 'normals'); urls.push(url); let raster = new Raster({ format: 'vec3'}); this.rasters.push(raster); } this.layout.setUrls(urls); })().catch(e =&gt; { console.log(e); this.status = e; }); } /* * Internal function: light control maps to light direction in the shader. */ interpolateControls() { let done = super.interpolateControls(); if(!done) { let light = this.controls['light'].current.value; //this.shader.setLight(light); let rotated = Transform.rotate(light[0], light[1], this.worldRotation*Math.PI); this.shader.setLight([rotated.x, rotated.y]); } return done; } draw(transform, viewport) { this.worldRotation = transform.a + this.transform.a; return super.draw(transform, viewport); } } Layer.prototype.types['rti'] = (options) =&gt; { return new LayerRTI(options); } export { LayerRTI } × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Layout.js.html":{"id":"Layout.js.html","title":"Source: Layout.js","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Source: Layout.js import { BoundingBox } from \"./BoundingBox\"; import { addSignals } from \"./Signals\"; import { Tile } from \"./Tile\"; import { CoordinateSystem } from \"./CoordinateSystem\"; // Tile level x y index ----- tex missing() start/end (tarzoom) ----- time, priority size(byte) /** * A tile represents a single element of a regular grid that subdivides an image. * A tile is identified by its position (`x`, `y`) within the grid and the zoom `level` of the image. * @typedef {Object} Tile * @property {number} level The zoom level of the tile. * @property {number} x x position of the tile in the grid. * @property {number} y y position of the tile in the grid. * @property {number} index Unique tile identifier. * @property {number} start The position of the first byte of the tile in the image dataset (used only for tarzoom and itarzoom image formats). * @property {number} end The position of the last byte of the tile in the image dataset (used only for tarzoom and itarzoom image formats). * @property {number} missing In the case of multi-channel formats (RTI, BRDF), the information content of a tile is distributed over several planes (channels). * `missing` represents the number of pending channel data requests. * @property {Array} tex A array of WebGLTexture (one texture per channel). * @property {time} time Tile creation time (this value is used internally by the cache algorithms). * @property {number} priority The priority of the tile (this value is used internally by the cache algorithms). * @property {number} size The total size of the tile in bytes (this value is used internally by the cache algorithms). */ /** * The type of the image. All web single-resolution image types (*jpg*, *png*, *gif*, etc...) are supported * as well as the most common multi-resolution image formats (*deepzoom*, *zoomify*, *IIIF*, *google maps*). * @typedef {('image'|'deepzoom'|'deepzoom1px'|'google'|'zoomify'|'iiif'|'tarzoom'|'itarzoom')} Layout#Type */ /** * The Layout class is responsible for specifying the data formats (images) managed by OpenLIME. * All web single-resolution image types (*jpg*, *png*, *gif*, etc...) are supported as well as the most common * tiled image formats (*deepzoom*, *zoomify*, *IIIF*, *google maps*), which are suitable for large images. * #### Single-resolution images * The URL is the address of the file (for instance, 'https://my.example/image.jpg'). * #### Tiled images * They can be specified in a variety of ways depending on the format chosen. * * **deepzoom** - The root tile of the image pyramid has a size &gt; 1px (typical value is 254px). It is defined by the URL of the *.dzi* file * (for instance, 'https://my.example/image.dzi'). See: {@link https://docs.microsoft.com/en-us/previous-versions/windows/silverlight/dotnet-windows-silverlight/cc645077(v=vs.95)?redirectedfrom=MSDN DeepZoom} * * **deepzoom1px** - The root tile of the image pyramid has a size = 1px. It is defined by the URL of the *.dzi* file * (for instance, 'https://my.example/image.dzi'). See: {@link https://docs.microsoft.com/en-us/previous-versions/windows/silverlight/dotnet-windows-silverlight/cc645077(v=vs.95)?redirectedfrom=MSDN DeepZoom} * * **google** - The URL points directly to the directory containing the pyramid of images (for instance, 'https://my.example/image'). * The standard does not require any configuration file, so it is mandatory to indicate in the `options` the * width and height in pixels of the original image. See: {@link https://www.microimages.com/documentation/TechGuides/78googleMapsStruc.pdf Google Maps} * * **zoomify** - The URL indicates the location of Zoomify configuration file (for instance, 'https://my.example/image/ImageProperties.xml'). * See: {@link http://www.zoomify.com/ZIFFileFormatSpecification.htm Zoomify} * * **iiif** - According to the standard, the URL is the address of a IIIF server (for instance, 'https://myiiifserver.example/'). * See: {@link https://iipimage.sourceforge.io/ IIP Server}, {@link https://iiif.io/api/image/3.0/ IIIF } * * **tarzoom** and **itarzoom** - This is a custom format of the OpenLIME framework. It can be described as the TAR of a DeepZoom (all the DeepZoom image pyramid is stored in a single file). * It takes advantage of the fact that current web servers are able to handle partial-content HTTP requests. Tarzoom facilitates * the work of the server, which is not penalised by having to manage a file system with many small files. The URL is the address of the *.tzi* file * (for instance, 'https://my.example/image.tzi'). Warning: tarzoom|itarzoom may not work on older web servers. */ class Layout { /** * Creates a Layout, a container for a raster image. * A layout is defined by a `url` of the image and a `type`. * Additionally, an object literal with Layout `options` can be specified. * Signals are triggered when the layout is ready to be drawn or its size is modified. * @param {string} url URL of the image. * @param {Layout#Type} type The type of the image. * @param {Object} [options] An object literal describing the layout content. * @param {number} options.width The total width of the original, unsplit image. This parameter must only be specified for the 'google' layout type. * @param {number} options.height The total height of the original, unsplit image. This parameter must only be specified for the 'google' layout type. * @param {string} options.suffix='jpg' The filename suffix of the tiles. * @param {string} options.subdomains='abc' The ('a'|'b'|'c') *s* subdomain of a Google template URL (for instance: 'https:{s}.my.example//{z}/{x}/{y}.png'). */ constructor(url, type, options) { if (type == 'image') { this.setDefaults(type); this.init(url, type, options); } else if(type in this.types) return this.types[type](url, type, options); else if(type == null) return; else throw \"Layout type: \" + type + \" unknown, or module not loaded\"; } getTileSize() { return [this.width, this.height]; } setDefaults(type) { Object.assign(this, { type: type, width: 0, height: 0, suffix: 'jpg', urls: [], status: null, subdomains: 'abc' }); } init(url, type, options) { if(options) Object.assign(this, options); if(typeof(url) == 'string') this.setUrls([url]); if(this.width &amp;&amp; this.height) this.status = 'ready'; } /** @ignore */ setUrls(urls) { /** * The event is fired when a layout is ready to be drawn(the single-resolution image is downloaded or the multi-resolution structure has been initialized). * @event Layout#ready */ this.urls = urls; this.getTileURL = (rasterid, tile) =&gt; { return this.urls[rasterid]; } this.status = 'ready'; this.emit('ready'); } imageUrl(url, plane) { let path = url.substring(0, url.lastIndexOf('/')+1); return path + plane + '.jpg'; } /** * Gets the URL of a specific tile. The function must be implemented for each layout type supported by OpenLIME. * @param {number} id The channel id. * @param {Tile} tile The tile. */ getTileURL(id, tile) { throw Error(\"Layout not defined or ready.\"); } /** * Gets the layout bounding box. * @returns {BoundingBox} The layout bounding box. */ boundingBox() { //if(!this.width) throw \"Layout not initialized still\"; return new BoundingBox({xLow:-this.width/2, yLow: -this.height/2, xHigh: this.width/2, yHigh: this.height/2}); } /** * Returns the coordinates of the tile (in [0, 0, w h] image coordinate system) and the texture coords associated. * @returns the tile coordinates (image coords and texture coords) */ tileCoords(tile) { let w = this.width; let h = this.height; //careful: here y is inverted due to textures not being flipped on load (Firefox fault!). var tcoords = new Float32Array([0, 1, 0, 0, 1, 0, 1, 1]); return { coords: new Float32Array([-w/2, -h/2, 0, -w/2, h/2, 0, w/2, h/2, 0, w/2, -h/2, 0]), tcoords: tcoords }; } newTile(index) { let tile = new Tile(); tile.index = index; return tile; } /** returns the list of tiles required for a rendering, sorted by priority, max */ needed(viewport, transform, layerTransform, border, bias, tiles, maxtiles = 8) { //FIXME should check if image is withing the viewport (+ border) let tile = tiles.get(0) || this.newTile(0); //{ index, x, y, missing, tex: [], level }; tile.time = performance.now(); tile.priority = 10; if (tile.missing === null) // || tile.missing != 0 &amp;&amp; !this.requested[index]) return [tile]; return []; } /** returns the list of til t subdivides an image. * A tile is identified by its position (`x`, `y`) within the grid and the zoom `level` of the image. * @typedef {Object} Tile * @property {number} level The zoom level of the tile. * @property {number} x x position of the tile in the grid. * @property {number} y y position of the tile in the grid. * @property {number} index Unique tile identifier. * @property {number} start The position of the first byte of the tile in the image dataset (used only for tarzoom and itarzoom image formats). * @property {number} end The position of the last byte of the tile in the image dataset (used only for tarzoom and itarzoom image formats). * @property {number} missing In the case of multi-channel formats (RTI, BRDF), the information content of a tile is distributed over several planes (channels). * `missing` represents the number of pending channel data requests. * @property {Array} tex A array of WebGLTexture (one texture per channel). * @property {time} time Tile creation time (this value is used internally by the cache algorithms). * @property {number} priority The priority of the tile (this value is used internally by the cache algorithms). * @property {number} size The total size of the tile in bytes (this value is used internally by the cache algorithms). */ /** * The type of the image. All web single-resolution image types (*jpg*, *png*, *gif*, etc...) are supported * as well as the most common multi-resolution image formats (*deepzoom*, *zoomify*, *IIIF*, *google maps*). * @typedef {('image'|'deepzoom'|'deepzoom1px'|'google'|'zoomify'|'iiif'|'tarzoom'|'itarzoom')} Layout#Type */ /** * The Layout class is responsible for specifying the data formats (images) managed by OpenLIME. * All web single-resolution image types (*jpg*, *png*, *gif*, etc...) are supported as well as the most common * tiled image formats (*deepzoom*, *zoomify*, *IIIF*, *google maps*), which are suitable for large images. * #### Single-resolution images * The URL is the address of the file (for instance, 'https://my.example/image.jpg'). * #### Tiled images * They can be specified in a variety of ways depending on the format chosen. * * **deepzoom** - The root tile of the image pyramid has a size &gt; 1px (typical value is 254px). It is defined by the URL of the *.dzi* file * (for instance, 'https://my.example/image.dzi'). See: {@link https://docs.microsoft.com/en-us/previous-versions/windows/silverlight/dotnet-windows-silverlight/cc645077(v=vs.95)?redirectedfrom=MSDN DeepZoom} * * **deepzoom1px** - The root tile of the image pyramid has a size = 1px. It is defined by the URL of the *.dzi* file * (for instance, 'https://my.example/image.dzi'). See: {@link https://docs.microsoft.com/en-us/previous-versions/windows/silverlight/dotnet-windows-silverlight/cc645077(v=vs.95)?redirectedfrom=MSDN DeepZoom} * * **google** - The URL points directly to the directory containing the pyramid of images (for instance, 'https://my.example/image'). * The standard does not require any configuration file, so it is mandatory to indicate in the `options` the * width and height in pixels of the original image. See: {@link https://www.microimages.com/documentation/TechGuides/78googleMapsStruc.pdf Google Maps} * * **zoomify** - The URL indicates the location of Zoomify configuration file (for instance, 'https://my.example/image/ImageProperties.xml'). * See: {@link http://www.zoomify.com/ZIFFileFormatSpecification.htm Zoomify} * * **iiif** - According to the standard, the URL is the address of a IIIF server (for instance, 'https://myiiifserver.example/'). * See: {@link https://iipimage.sourceforge.io/ IIP Server}, {@link https://iiif.io/api/image/3.0/ IIIF } * * **tarzoom** and **itarzoom** - This is a custom format of the OpenLIME framework. It can be described as the TAR of a DeepZoom (all the DeepZoom image pyramid is stored in a single file). * It takes advantage of the fact that current web servers are able to handle partial-content HTTP requests. Tarzoom facilitates * the work of the server, which is not penalised by having to manage a file system with many small files. The URL is the address of the *.tzi* file * (for instance, 'https://my.example/image.tzi'). Warning: tarzoom|itarzoom may not work on older web servers. */ class LayoutTiles extends Layout { /** * Creates a Layout, a container for a raster image. * A layout is defined by a `url` of the image and a `type`. * Additionally, an object literal with Layout `options` can be specified. * Signals are triggered when the layout is ready to be drawn or its size is modified. * @param {string} url URL of the image. * @param {Layout#Type} type The type of the image. * @param {Object} [options] An object literal describing the layout content. * @param {number} options.width The total width of the original, unsplit image. This parameter must only be specified for the 'google' layout type. * @param {number} options.height The total height of the original, unsplit image. This parameter must only be specified for the 'google' layout type. * @param {string} options.suffix='jpg' The filename suffix of the tiles. * @param {string} options.subdomains='abc' The ('a'|'b'|'c') *s* subdomain of a Google template URL (for instance: 'https:{s}.my.example//{z}/{x}/{y}.png'). * @param {number} options.cachelevels Number of levels above the current level which will be loaded. Lowering will reduce number of http requests, but image will have tile missing while loading. */ constructor(url, type, options) { super(url, null, options); this.setDefaults(type); this.init(url, type, options); } setDefaults(type) { super.setDefaults(type); Object.assign(this, { tilesize: 256, overlap: 0, nlevels: 1, //level 0 is the top, single tile level. qbox: [], //array of bounding box in tiles, one for mipmap bbox: [], //array of bounding box in pixels (w, h) urls: [], cachelevels: 10, }); } /** @ignore */ setUrls(urls) { /** * The event is fired when a layout is ready to be drawn(the single-resolution image is downloaded or the multi-resolution structure has been initialized). * @event Layout#ready */ this.urls = urls; (async () =&gt; { switch(this.type) { case 'google': await this.initGoogle(); break; // No Url needed case 'deepzoom1px': await this.initDeepzoom(true); break; // urls[0] only needed case 'deepzoom': await this.initDeepzoom(false); break; // urls[0] only needed case 'zoomify': await this.initZoomify(); break; // urls[0] only needed case 'iiif': await this.initIIIF(); break; // urls[0] only needed case 'tarzoom': await this.initTarzoom(); break; // all urls needed case 'itarzoom': await this.initITarzoom(); break; // actually it has just one url } this.initBoxes(); this.status = 'ready'; this.emit('ready'); })().catch(e =&gt; { console.log(e); this.status = e; }); } /* * Internal function to assemble the url needed to retrieve the image or the image tile. */ imageUrl(url, plane) { let path = url.substring(0, url.lastIndexOf('/')+1); switch(this.type) { case 'image': return path + plane + '.jpg'; break; case 'google': return path + plane; break; case 'deepzoom': return path + plane + '.dzi'; break; case 'tarzoom': return path + plane + '.tzi'; break; case 'itarzoom': return path + 'planes.tzi'; break; case 'zoomify': return path + plane + '/ImageProperties.xml'; break; //case 'iip': return this.plane.throw Error(\"Unimplemented\"); case 'iiif': throw Error(\"Unimplemented\"); default: throw Error(\"Unknown layout: \" + this.type); } } getTileSize() { return [this.tilesize, this.tilesize]; } /** * Each tile is assigned an unique number. */ /** @ignore */ index(level, x, y) { let startindex = 0; for(let i = 0; i &lt; level; i++) startindex += this.qbox[i].xHigh*this.qbox[i].yHigh; return startindex + y*this.qbox[level].xHigh + x; } reverseIndex(index) { let originalindex = index; let level = 0; for(let i = 0; i &lt; this.qbox.length; i++) { let size = this.qbox[i].xHigh*this.qbox[i].yHigh; if(index - size &lt; 0) break; index -= size; level++; } let width = this.qbox[level].xHigh; let y = Math.floor(index/width) let x = index % width; console.assert(this.index(level, x, y) == originalindex); return {level, x, y }; } /* * Compute all the bounding boxes (this.bbox and this.qbox). * @return number of tiles in the dataset */ /** @ignore */ initBoxes() { /** * The event is fired when a layout size is modified (and the scene extension must be recomputed at canvas level). * @event Layout#updateSize */ this.qbox = []; //by level (0 is the bottom) this.bbox = []; var w = this.width; var h = this.height; if(this.type == 'image') { this.qbox[0] = new BoundingBox({xLow:0, yLow: 0, xHigh: 1, yHigh: 1}); this.bbox[0] = new BoundingBox({xLow:0, yLow: 0, xHigh: w, yHigh: h}); // Acknowledge bbox change (useful for knowing scene extension (at canvas level)) this.emit('updateSize'); return 1; } for(let level = this.nlevels - 1; level &gt;= 0; level--) { this.qbox[level] = new BoundingBox({xLow:0, yLow: 0, xHigh: 0, yHigh: 0}); this.bbox[level] = new BoundingBox({xLow:0, yLow: 0, xHigh: w, yHigh: h}); this.qbox[level].yHigh = Math.ceil(h/this.tilesize); this.qbox[level].xHigh = Math.ceil(w/this.tilesize); w &gt;&gt;&gt;= 1; h &gt;&gt;&gt;= 1; } // Acknowledge bbox (useful for knowing scene extension (at canvas level)) this.emit('updateSize'); } /** * Returns the coordinates of the tile (in [0, 0, w h] image coordinate system) and the texture coords associated. * @returns the tile coordinates (image coords and texture coords) */ tileCoords(tile) { let {level, x, y } = tile; let w = this.width; let h = this.height; //careful: here y is inverted due to textures not being flipped on load (Firefox fault!). var tcoords = new Float32Array([0, 1, 0, 0, 1, 0, 1, 1]); let coords = new Float32Array([0, 0, 0, 0, 1, 0, 1, 1, 0, 1, 0, 0]); // FIXME 32 bit and errors let ilevel = this.nlevels - 1 - level; let side = this.tilesize*(1&lt;&lt;(ilevel)); //tile size in imagespace let tx = side; let ty = side; if(side*(x+1) &gt; this.width) { tx = (this.width g, tex: [], level }; tile.time = now; tile.priority = neededBox.level - level; if(tile.priority &gt; this.cachelevels) continue; if (tile.missing === null) // || tile.missing != 0 &amp;&amp; !this.requested[index]) tmp.push(tile); } } let c = box.center(); //sort tiles by distance to the center TODO: check it's correct! tmp.sort(function (a, b) { return Math.abs(a.x - c.x) + Math.abs(a.y - c.y) - Math.abs(b.x - c.x) - Math.abs(b.y - c.y); }); needed = needed.concat(tmp); } return needed; } /** returns the list of tiles available for a rendering */ available(viewport, transform, layerTransform, border, bias, tiles) { let needed = this.neededBox(viewport, transform, layerTransform, 0, bias); let torender = {}; //array of minlevel, actual level, x, y (referred to minlevel) let brothers = {}; let minlevel = needed.level; let box = needed.pyramid[minlevel]; for (let y = box.yLow; y &lt; box.yHigh; y++) { for (let x = box.xLow; x &lt; box.xHigh; x++) { let level = minlevel; while (level &gt;= 0) { let d = minlevel - level; let index = this.index(level, x &gt;&gt; d, y &gt;&gt; d); if (tiles.has(index) &amp;&amp; tiles.get(index).missing == 0) { torender[index] = tiles.get(index); //{ index: index, level: level, x: x &gt;&gt; d, y: y &gt;&gt; d, complete: true }; break; } else { let sx = (x &gt;&gt; (d + 1)) &lt;&lt; 1; let sy = (y &gt;&gt; (d + 1)) &lt;&lt; 1; brothers[this.index(level, sx, sy)] = 1; brothers[this.index(level, sx + 1, sy)] = 1; brothers[this.index(level, sx + 1, sy + 1)] = 1; brothers[this.index(level, sx, sy + 1)] = 1; } level--; } } } for (let index in brothers) { if (index in torender) torender[index].complete = false; } return torender; } /** * Computes the tiles needed for each level, given a viewport and a transform. * @param {Viewport} viewport The viewport. * @param {Transform} transform The current transform. * @param {Transform} layerTransform The transform of the calling layer * @param {number} border The threshold (in tile units) around the cu  0.612, 0.354, 0.707], 'base'); this.lightWeights([-0.612, 0.354, 0.707], 'base1'); this.lightWeights([ 0, -0.707, 0.707], 'base2'); } this.needsUpdate = true; } setLight(light) { if(!this.uniforms.light) throw \"Shader not initialized, wait on layer ready event for setLight.\" let x = light[0]; let y = light[1]; //map the square to the circle. let r = Math.sqrt(x*x + y*y); if(r &gt; 1) { x /= r; y /= r; } let z = Math.sqrt(Math.max(0, 1 - x*x - y*y)); light = [x, y, z]; if(this.mode == 'light') this.lightWeights(light, 'base'); this.setUniform('light', light); } setSpecularExp(value) { this.setUniform('specular_exp', value); } init(relight) { Object.assign(this, relight); if(this.colorspace == 'mycc') this.nplanes = this.yccplanes[0] + this.yccplanes[1] + this.yccplanes[2]; else this.yccplanes = [0, 0, 0]; this.planes = []; this.njpegs = 0; while(this.njpegs*3 &lt; this.nplanes) this.njpegs++; for(let i = 0; i &lt; this.njpegs; i++) this.samplers.push({ id:i, name:'plane'+i, type:'vec3' }); if(this.normals) this.samplers.push({ id:this.njpegs, name:'normals', type:'vec3' }); this.material = this.materials[0]; if(this.lights) this.lights + new Float32Array(this.lights); if(this.type == \"rbf\") this.ndimensions = this.lights.length/3; if(this.type == \"bilinear\") { this.ndimensions = this.resolution*this.resolution; this.type = \"bln\"; } this.scale = this.material.scale; this.bias = this.material.bias; if(['mrgb', 'mycc'].includes(this.colorspace)) this.loadBasis(this.basis); this.uniforms = { light: { type: 'vec3', needsUpdate: true, size: 3, value: [0.0, 0.0, 1] }, specular_exp: { type: 'float', needsUpdate: false, size: 1, value: 10 }, bias: { type: 'vec3', needsUpdate: true, size: this.nplanes/3, value: this.bias }, scale: { type: 'vec3', needsUpdate: true, size: this.nplanes/3, value: this.scale }, base: { type: 'vec3', needsUpdate: true, size: this.nplanes }, base1: { type: 'vec3', needsUpdate: false, size: this.nplanes }, base2: { type: 'vec3', needsUpdate: button: visually a button, attributes: group, layer, mode * slider: callback(percent) * list: an array of entries. * * Additional attributes: * onclick: a function(event) {} * group: a group of entries where at most one is active * layer: a layer id: will be active if layer is visible * mode: a layer visualization mode, active if it's the current mode. * layer + mode: if both are specified, both must be current for an active. */ /** * **UIBasic** is a flexible and easy-to-use class that implements a complete user interface to bind to the `viewer` * The interface is associated with a CSS file (skin.css) that defines the style of the HTML DOM and a graphic * file (skin.svg) that specifies the geometric characteristics of the tool buttons. * * The class provides a set of default ready-to-use tools (called actions): * * **home** resets the camera. * * **fullscreen** enables the fullscreen mode. * * **layers** displays the layer menu. * * **zoomin** performs a camera zoom-in. * * **zoomout** performs a camera zoom-out. * * **rotate** rotates the camera around the z-axis (by 45-degs steps). * * **light** enables light manipulation. * * **help** displays a help dialog box. * * In the following example a UIBasic interface is created and binded to the `lime` viewer. * The `light` action is disabled, and the `zoomin` and `zoomout` actions are enabled. * ``` * // Creates an User Interface * const ui = new OpenLIME.UIBasic(lime); * * // Removes light from the toolbar * ui.actions.light.display=false; * // Adds zoomin and zoomout to the toolbar * ui.actions.zoomin.display=true; * ui.actions.zoomout.display=true; * ``` */ class UIBasic { /** * Instantiates a UIBasic object. * @param {Viewer} viewer The OpenLIME viewer. * @param {Object} [options] An object literal with UIBasic parameters. * @param {string} options.skin='skin/skin.svg' The file name of the vector image defining the tool buttons. * @param {bool} options.autofit=true Whether the initial position of the camera is set to fit the scene model. * @param {number} options.priority=0 Higher priority controllers are invoked first. * @param {{UIBasic#Action}} options.actions An Object of {@link UIBasic#Action}. A set of default actions are ready to be used. * @param {string} options.attribution Some information related to data attribution or credits. * @param {Array&lt;UIBasic#MenuEntry&gt;} options.menu The interface menu structure. * @param {bool} options.enableTooltip=true Whether to enable tool button tooltip. * @param {bool} options.showLightDirections=false Whether to draw light direction vectors. */ constructor(viewer, options) { //we need to know the size of the scene but the layers are not ready. let camera = viewer.camera; Object.assign(this, { viewer: viewer, camera: viewer.camera, skin: 'skin/skin.svg', autoFit: true, //FIXME to be moved in the viewer? //skinCSS: 'skin.css', // TODO: probably not useful actions: { home: { title: 'Home', display: true, key: 'Home', task: (event) =&gt; { if (camera.boundingBox) camera.fitCameraBox(250); } }, fullscreen: { title: 'Fullscreen', display: true, key: 'f', task: (event) =&gt; { this.toggleFullscreen(); } }, layers: { title: 'Layers', display: true, key: 'Escape', task: (event) =&gt; { this.toggleLayers(); } }, zoomin: { title: 'Zoom in', display: false, key: '+', task: (event) =&gt; { camera.deltaZoom(250, 1.25, 0, 0); } }, zoomout: { title: 'Zoom out', display: false, key: '-', task: (event) =&gt; { camera.deltaZoom(250, 1 / 1.25, 0, 0); } }, rotate: { title: 'Rotate', display: false, key: 'r', task: (event) =&gt; { camera.rotate(250, -45); } }, light: { title: 'Light', display: 'auto', key: 'l', task: (event) =&gt; { this.toggleLightController(); } }, ruler: { title: 'Ruler', display: false, task: (event) =&gt; { this.toggleRuler(); } }, help: { title: 'Help', display: false, key: '?', task: (event) =&gt; { this.toggleHelp(this.actions.help); }, html: '&lt;p&gt;Help here!&lt;/p&gt;' }, //FIXME Why a boolean in toggleHelp? snapshot: { title: 'Snapshot', display: false, task: (event) =&gt; { this.snapshot() } }, //FIXME not work! }, pixelSize: null, unit: null, //FIXME to be used with ruler attribution: null, //image attribution lightcontroller: null, showLightDirections: false, enableTooltip: true, controlZoomMessage: null, //\"Use Ctrl + Wheel to zoom instead of scrolling\" , menu: [] }); Object.assign(this, options); if (this.autoFit) //FIXME Check if fitCamera is triggered only if the layer is loaded. Is updateSize the right event? this.viewer.canvas.addEvent('updateSize', () =&gt; this.viewer.camera.fitCameraBox(0)); this.panzoom = new ControllerPanZoom(this.viewer.camera, { priority: -1000, activeModifiers: [0, 1], controlZoom: this.controlZoomMessage != null }); if(this.controlZoomMessage) this.panzoom.addEvent('nowheel', () =&gt; { this.showOverlayMessage(this.controlZoomMessage); }); this.viewer.pointerManager.onEvent(this.panzoom); //register wheel, doubleclick, pan and pinch // this.viewer.pointerManager.on(\"fingerSingleTap\", { \"fingerSingleTap\": (e) =&gt; { this.showInfo(e); }, priority: 10000 }); /*let element = entry.element; let group = element.getAttribute('data-group'); let layer = element.getAttribute('data-layer'); let mode = element.getAttribute('data-mode'); let active = (layer &amp;&amp; this.viewer.canvas.layers[layer].visible) &amp;&amp; (!mode || this.viewer.canvas.layers[layer].getMode() == mode); entry.element.classList.toggle('active', active); */ this.menu.push({ section: \"Layers\" }); for (let [id, layer] of Object.entries(this.viewer.canvas.layers)) { let modes = [] for (let m of layer.getModes()) { let mode = { button: m, mode: m, layer: id, onclick: () =&gt; { layer.setMode(m); }, status: () =&gt; layer.getMode() == m ? 'active' : '', }; if (m == 'specular' &amp;&amp; layer.shader.setSpecularExp) mode.list = [{ slider: '', oninput: (e) =&gt; { layer.shader.setSpecularExp(e.target.value); } }]; modes.push(mode); } let layerEntry = { button: layer.label || i dEvent('update', () =&gt; this.updateMenu()); if (this.actions.light &amp;&amp; this.actions.light.display === 'auto') this.actions.light.display = true; if (this.skin) await this.loadSkin(); /* TODO: this is probably not needed if(this.skinCSS) await this.loadSkinCSS(); */ this.setupActions(); if(this.pixelSize) this.scalebar = new ScaleBar(this.pixelSize, this.viewer); if(this.attribution) { var p = document.createElement('p'); p.classList.add('openlime-attribution'); p.innerHTML = this.attribution; this.viewer.containerElement.appendChild(p); } for(let l of Object.values(this.viewer.canvas.layers)) { this.setLayer(l); break; } if(this.actions.light &amp;&amp; this.actions.light.active) this.toggleLightController(); if(this.actions.layers &amp;&amp; this.actions.layers.active) this.toggleLayers(); })().catch(e =&gt; { console.log(e); throw Error(\"Something failed\") }); } /** @ignore */ keyDown(e) { } /** @ignore */ keyUp(e) { if (e.target != document.body &amp;&amp; e.target.closest('input, textarea') != null) return; if (e.defaultPrevented) return; for (const a of Object.values(this.actions)) { if ('key' in a &amp;&amp; a.key == e.key) { e.preventDefault(); a.task(e); return; } } } /** @ignore */ async loadSkin() { let toolbar = document.createElement('div'); toolbar.classList.add('openlime-toolbar'); this.viewer.containerElement.appendChild(toolbar); //toolbar manually created with parameters (padding, etc) + css for toolbar positioning and size. if (1) { let padding = 10; let x = 0; let h = 0; for (let [name, action] of Object.entries(this.actions)) { if (action.display !== true) continue; if('icon' in action) { if(typeof action.icon == 'string') { if(Util.isSVGString(action.icon)) { action.icon = Util.SVGFromString(action.icon); } else { action.icon = await Util.loadSVG(action.icon); } action.icon.classList.add('openlime-button'); } } else { action.icon = '.openlime-' + name; } action.element = await Skin.appendIcon(toolbar, action.icon); if (this.enableTooltip) { let title = document.createElementNS('http://www.w3.org/2000/svg', 'title'); title.textContent = action.title; action.element.appendChild(title); } } } if (0) { //single svg toolbar let svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg'); toolbar.appendChild(svg); ui.toggleLightController(); let x = padding; let h = 0; for (let [name, action] of Object.entries(this.actions)) { if (action.display !== true) continue; let element = skin.querySelector('.openlime-' + name).cloneNode(true); if (!element) continue; svg.appendChild(element); let box = element.getBBox(); h = Math.max(h, box.height); let tlist = element.transform.baseVal; if (tlist.numberOfItems == 0) tlist.appendItem(svg.createSVGTransform()); tlist.getItem(0).setTranslate(-box.x + x, -box.y); x += box.width + padding; } svg.setAttribute('viewBox', `0 0 ${x} ${h}`); svg.setAttribute('preserveAspectRatio', 'xMidYMid meet'); } //TODO: not needed, probably. Toolbar build from the skin directly if (0) { toolbar.appendChild(skin); let w = skin.getAttribute('width'); let h = skin.getAttribute('height'); let viewbox = skin.getAttribute('viewBox'); if (!viewbox) skin.setAttribute('viewBox', `0 0 ${w} ${h}`); } } /** @ignore */ setupActions() { for (let [name, action] of Object.entries(this.actions)) { let element = action.element; if (!element) continue; // let pointerManager = new PointerManager(element); // pointerManager.onEvent({ fingerSingleTap: action.task, priority: -2000 }); element.addEventListener('click', (e) =&gt; { action.task(e); e.preventDefault(); }); } let items = document.querySelectorAll('.openlime-layers-button'); for (let item of items) { let id = item.getAttribute('data-layer'); if (!id) continue; item.addEventListener('click', () =&gt; { this.setLayer(this.viewer.layers[id]); }); } } //we need the concept of active layer! so we an turn on and off light. /** @ignore */ toggleLightController(on) { let div = this.viewer.containerElement; let active = div.classList.toggle('o selector of a `div` element. * Additionally, an object literal with Viewer `options` can be specified. * The class creates the canvas, enables the WebGL context and takes care of the content redrawing when needed. * Viewer is the main class of the OpenLIME framework. It allows access to all the internal structures that make up the system. * * @param {(HTMLElement|string)} div A DOM element or a selector (es. '#openlime' or '.openlime'). * @param {Object} [options] An object literal describing the viewer content. * @param {color} options.background CSS style for background (it overwrites CSS if present). * @param {bool} options.autofit=true Whether the initial position of the camera is set to fit the scene model. */ constructor(div, options) { Object.assign(this, { background: null, autofit: true, canvas: {}, camera: new Camera(), }); if (typeof (div) == 'string') div = document.querySelector(div); if (!div) throw \"Missing element parameter\"; Object.assign(this, options); if (this.background) div.style.background = this.background; this.containerElement = div; this.canvasElement = div.querySelector('canvas'); if (!this.canvasElement) { this.canvasElement = document.createElement('canvas'); div.prepend(this.canvasElement); } this.overlayElement = document.createElement('div'); this.overlayElement.classList.add('openlime-overlay'); this.containerElement.appendChild(this.overlayElement); this.canvas = new Canvas(this.canvasElement, this.overlayElement, this.camera, this.canvas); this.canvas.addEvent('update', () =&gt; { this.redraw(); }); if (this.autofit) this.canvas.addEvent('updateSize', () =&gt; this.camera.fitCameraBox(0)); this.pointerManager = new PointerManager(this.overlayElement); this.canvasElement.addEventListener('contextmenu', (e) =&gt; { e.preventDefault(); return false; }); let resizeobserver = new ResizeObserver(entries =&gt; { for (let entry of entries) { this.resize(entry.contentRect.width, entry.contentRect.height); } }); resizeobserver.observe(this.canvasElement); this.resize(this.canvasElement.clientWidth, this.canvasElement.clientHeight); } /** * Adds a device event controller to the viewer. * @param {Controller} controller An OpenLIME controller. */ addController(controller) { this.pointerManager.onEvent(controller); } /** Adds the given layer to the Viewer. * @param {string} id A label to identify the layer. * @param {Layer} layer An OpenLIME Layer object. */ addLayer(id, layer) { this.canvas.addLayer(id, layer); this.redraw(); } /** Remove the given layer from the Viewer. * @param {(Layer|string)} layer An OpenLIME Layer or a Layer identifier. */ removeLayer(layer) { if (typeof (layer) == 'string') layer = this.canvas.layers[layer]; if (layer) { this.canvas.removeLayer(layer); this.redraw(); } } /* Resizes the canvas (and the overlay) and triggers a redraw. * This method is internal and used by a ResizeObserver of the Canvas size. * @param {number} width A width value defined in CSS pixel. * @param {number} height A height value defined in CSS pixel. */ /** * @ignore */ resize(width, height) { // Test with retina display! this.canvasElement.width = width * window.devicePixelRatio; this.canvasElement.height = height * window.devicePixelRatio; let view = { x: 0, y: 0, dx: width, dy: height, w: width, h: height }; this.camera.setViewport(view); this.emit('resize', view); this.canvas.prefetch(); this.redraw(); } /** * Schedules a redrawing. */ redraw() { if (this.animaterequest) return; this.animaterequest = requestAnimationFrame((time) =&gt; { this.draw(time); }); this.requestTime = performance.now(); } /* * Renders the canvas content. * This method is internal. * @param {time} time The current time (a DOMHighResTimeStamp variable, as in `performance.now()`). */ /** * @ignore */ draw(time) { if (!time) time = performance.now(); this.animaterequest = null; let elapsed = performance.now() - this.requestTime; this.canvas.addRenderTiming(elapsed); let viewport = this.camera.viewport; let transform = this.camera.getCurrentTransform(time); let done = this.canvas.draw(time); if (!done) this.redraw(); this.emit('draw'); } } addSignals(Viewer, 'draw'); addSignals(Viewer, 'resize'); //args: viewport export { Viewer }; × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"global.html":{"id":"global.html","title":"Global","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Global Members &lt;constant&gt; RenderingMode RenderingMode for lens and background. Currently implemented only draw and hide. Source: LensDashboard.js, line 7 Methods crudCallback(anno) Callback for create/update/delete annotations. Parameters: Name Type Description anno Annotation The current annotation entry. Source: EditorSvgAnnotation.js, line 7 customDataCallback(anno) Callback to customize the annotation data object. Parameters: Name Type Description anno Annotation The current annotation entry. Source: EditorSvgAnnotation.js, line 19 customStateCallback(anno) Callback implementing custom state annotations. Parameters: Name Type Description anno Annotation The current annotation entry. Source: EditorSvgAnnotation.js, line 13 selectedCallback(anno) Callback executed when an annotation is selcted on the user interface. Parameters: Name Type Description anno Annotation The current ann multiple layers or for visualization through lenses. The OpenLIME library comes with a responsive user iterface that works well with both desktop monitors and multitouch systems. Additionally, it is designed to be highly configurable, so it will be easy for the experienced developer to build their own custom interface. The library contains a convenient set of examples that can be used both to understand how the library works and as a starting point for programming with OpenLIME itself. Installing npm Ubuntu sudo apt install npm Ubuntu 18.04 You might have some problem using the old npm version shipped with Ubuntu18.04, and even upgrading it. This worked for me: sudo npm install -g npm@latest-6 Windows To obtain npm for Windows, you need to download the Windows version of node.js from https://nodejs.org/en/download/ . You can download either the Windows Installer (.msi) or the Windows Binary (.zip). If you download and expand the Windows Binary zip file, you will afterwards need to set your PATH variable to include the directory that contains the npm executable (this directory is the subdirectory node_modules\\npm\\bin). Setting up npm (all platforms) The following step should be performed in the openlime directory that was cloned from this repository. Before using npm, you need to install the required packages locally. This only needs to be done once. The following command tells npm to download all the webpack packages (and their dependencies) listed in the package.json file. These will be put in the ./node_modules directory. npm install The downloaded packages include rollup, documentation, and nodemon, which will be used below. Using npm (all platforms) These steps should be performed in the openlime directory that was cloned from this repository. Build the code The following command reads the javascript code in ./src, and puts the transpiled webpack code in ./dist/main.js. npm run build The webpack code is used, for example, by the ./dist/index.html web page. Run the node.js server If you wish, you can run the node.js development server to serve your web pages. This server will use ./dist as the home directory. The server is run in \"hot\" mode, which means that whenever you change a file in the ./src directory, the webpack code will automatically be rebuilt, and your web browser will automatically refresh, to reflect your latest changes. npm run start Then access the demo app at http://localhost:8080 (which by default is ./dist/index.html). If you prefer to serve from a different port, say 8088, you can call npm run start -- --port 8088 Create a rollup file to use with other servers You do not need to use node.js as the server. Instead, you can use the &lt;script&gt; approach, embedding a rollup file, either ./build/openlime.min.js or ./build/openlime.js, in your web page. The files ./dist/ui_custom.html and ./dist/ui_svg.html are examples of this approach. Such files will display correctly when served from any web server. To create the rollup files, call rollup: npm run rollup Keep the rollup files up to date If you keep a nodemon (node monitor) script running, it will automatically update the rollup files ./build/openlime.min.js and ./build/openlime.js whenever anything changes in the ./src directory. Note that, unlike with the node.js server, the browser will not refresh automatically; you will have to do that yourself once the rollup files have been updated. npm run nodemon Create documentation The documentation is created from structured comments in the source code (in ./src). Once created, it is accessible from ./docs/index.html npm run doc Customization skin.css skin.svg Run svgo -p 1 skin.svg -o skin.min.svg to minimize svg. Documentation.js supports markdown syntax and JSDoc syntax. JSON example of the configuration: { camera: { }, canvas: { rasters: [ { id: name: width: //optional height: //optional url: layout: &lt;image|google|deepzoom|zoomify|iip|iiif&gt; //optional if can be determined from the url. } ] }, overlay: { } } × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Annotation.html":{"id":"Annotation.html","title":"Class: Annotation","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Class: Annotation Annotation An annotation is a decoration (text, graphics element, glyph) to be drawn in an overlay mode on the canvas. Its purpose is to provide additional information useful for the interpretation of the underlying drawings. This calls defines the content of an annotation which is represented by its unique identifier and additional information (such as description, annotation category or class, drawing style, labels, etc.). new Annotation( [options]) Instantiates an Annotation object. An object literal with Annotation options can be specified. Note that the developer is free to define additional elements characterizing a custom annotation by adding new options to the constructor. Parameters: Name Type Argument Default Description options Object &lt;optional&gt; An object literal with Annotation options (freely adjustable). Properties Name Type Description label string A string containing an annotation label. option.description string A HTML text containg a comprehensive description of the annotation. option.class string A class or category t troller Controller Controller is a virtual base class that handles user interaction via device events (mouse/touch events). It provides an abstract user interface to define interaction actions such as panning, pinching, tapping, etc... The actions are implemented by pre-defined callback functions: panStart(e) intercepts the initial pan event (movement of the mouse after pressing a mouse button or moving a finger). The event is captured calling e.preventDefault(). panMove(e) receives and handles the pan event. panEnd(e) intercepts the final pan event (the user releases the left mouse button or removes his finger from the screen). pinchStart(e1, e2) intercepts the initial pinch event (a continuous gesture that tracks the positions between the first two fingers that touch the screen). The event is captured calling e1.preventDefault(). pinchMove(e1,e2) receives and handles the pinch event. pinchEnd(e1,e2) intercepts the final pinch event (the user removes one of their two fingers from the screen). mouseWheel(e) receives and handles the mouse wheel event (the user rotates the mouse wheel button). fingerSingleTap(e) receives and handles the single-tap event (the user presses a mouse button quickly or touches the screen shortly with a finger). fingerDoubleTap(e) receives and handles the double-tap event (the user quickly presses a mouse button twice or shortly touches the screen with a finger twice). e.preventDefault() will capture the event and wont be propagated to other controllers. This class only describes user interactions by implementing actions or callbacks. A Controller works in concert with a PointerManager object that emits events and links them to actions. In the example below a ControllerPanZoom object (derived from Controller) is created and associated with the pointerManager of the viewer. const panzoom = new OpenLIME.ControllerPanZoom(viewer.camera, { priority: -1000, activeModifiers: [0, 1] }); viewer.pointerManager.onEvent(panzoom); new Controller( [options]) Instantiates a Controller object. Parameters: Name Type Argument Description options Object &lt;optional&gt; An object literal with controller parameters. Properties Name Type Default Description panDelay number 50 Inertial value of the movement in ms for panning movements. zoomDelay number 200 A zoom event is smoothed over this delay in ms, priority number 0 Higher priority controllers are invoked first. Source: Controller.js, line 31 Methods modifierState(e) Returns the modifier state of the event e. Modifiers are keyboard events that happens simultaneously with a device event (e.g. shift + left mouse button). The modifiers handled by a controller are: NoModifiers = 0 CrtlModifier = 1 ShiftModifier = 2 AltModifier = 4 The modifier state is the sum of values above corresponding to the key pressed (CTRL, SHIFT or ALT). Parameters: Name Type Description e Event Source: Controller.js, line 66 Returns: The modifier state. Type number × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Controller2D.html":{"id":"Controller2D.html","title":"Class: Controller2D","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Class: Controller2D Controller2D Controller2D* intercepts pan and single-tap events in the canvas and updates a 2D position (x, y) of o, { viewer: lime, classes: classParam }); editor.createCallback = (anno) =&gt; { console.log(\"Created annotation: \", anno); processRequest(anno, 'create'); return true; }; editor.updateCallback = (anno) =&gt; { console.log(\"Updated annotation: \", anno); processRequest(anno, 'update'); return true; }; editor.deleteCallback = (anno) =&gt; { console.log(\"Deleted annotation: \", anno); processRequest(anno, 'delete'); return true; }; new EditorSvgAnnotation(viewer, layer [, options]) Instatiates a EditorSvgAnnotation object. Parameters: Name Type Argument Description viewer Viewer The OpenLIME viewer. layer LayerSvgAnnotation The annotation layer on which to operate. options Object &lt;optional&gt; An object literal with SVG editor parameters. Properties Name Type Default Description classes AnnotationClasses An object literal definying colors and labels of the annotation classes. createCallback crudCallback The callback to implement annotation creation. updateCallback crudCallback The callback to implement annotation update. deleteCallback crudCallback The callback to implement annotation deletion. enableState bool false Whether to enable custom annotation state. This allows to include some state variables into an annotation item (such as camera, light or lens position). customState customStateCallback The callback implementing custom state annotations. customData customDataCallback The callback to customize the annotation data object. selectedCallback selectedCallback The callback executed when an annotation is selcted on the user interface. Source: EditorSvgAnnotation.js, line 56 × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"FocusContext.html":{"id":"FocusContext.html","title":"Class: FocusContext","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLa anvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Class: Layer Layer The Layer class is responsible for drawing slides in the OpenLIME viewer. Layers can directly draw their contents on the viewer or be combined with each other to obtain more complex visualizations. OpenLIME provides a set of ready-to-use layers that allows developers to quickly publish their datasets on the web or make kiosk applications. Ready-to-use layers ranging from images, to multi-channel data (such as, for example, RTI or BRDF) or the combination of multiple layers or for visualization through lenses. A Layer takes raster data (images) as input which are managed by the layout. A layer stores all the information and functions needed to render the graphics (shaders, shader parameters, data structures, etc.), and takes care of data prefetching and communication with the cache. The Layer is a kind of primitive class from which other Layer classes can inherit. Each derived class \"registers\" on the Layer base class, the user can then use an instance of Layer by indicating the chosen type in the options. In the example below a Layer of type 'rti' is created, then a LayerRTI (class derived from Layer) is instantiated and added to the viewer's layer stack. new Layer( [options]) Creates a Layer. Additionally, an object literal with Layer options can be specified. Signals are triggered when the layer is ready (i.e. completely initialized) or if its state variables have been updated (a redraw is needed). Parameters: Name Type Argument Description options Object &lt;optional&gt; Properties Name Type Default Description layout string | Layout 'image' The layout (the format of the input raster images). type string A string identifier to select the specific derived layer class t CombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Class: LayerRTI LayerRTI Extends Layer, and can display a relightable images (RTI) using the 'relight' data format (see: relight on github for details). This web-friendly format is composed of a info.json with RTI parametets and a set of images (plane_0.jpg, plane_1.jpg etc.) with encoded coefficients. As with all other layers Deepzoom and other Layouts can be used. The ligh direction can be changed programmatically using setLight. new LayerRTI(options) Parameters: Name Type Description options options Same as Layer, but url and layout are required. url: points to a relight .json layout: one of image, deepzoom, google, iiif, zoomify, tarzoom, itarzoom Source: LayerRTI.js, line 20 × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"LayerSvgAnnotation.html":{"id":"LayerSvgAnnotation.html","title":"Class: LayerSvgAnnotation","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Class: LayerSvgAnnotation LayerSvgAnnotation An annotation layer that draws SVG elements directly on the canvas (outside the WebGL context). Here you will find a tutorial to learn how to build a client-server architecture to manage annotations in OpenLIME. //FIXME Extends LayerAnnotation. new LayerSvgAnnotation( [options]) Instantiates a LayerSvgAnnotation object. Parameters: Name Type Argument Description options Object &lt;optional&gt; An object literal with options that inherits from LayerAnnotation. Properties Name Type Default Description classes AnnotationClasses An object literal definying colors and labels of the annotation classes. onClick function The callback to fire when the an annotation is clicked on the canvas. The callback is passed an object containing the selected annotation. shadow bool true Whether to insert SVG elements in a shadow DOM. Source: LayerSvgAnnotation.js, line 26 Methods getSvgGroupTransform(transform, inverse) Return the string containing the transform for drawing the svg group in the proper position Parameters: Name Type Default Description transform Transform current transform parameter of the draw function inverse bool false when its false return the transform needed to draw the svgGroup Source: LayerSvgAnnotation.js, line 141 Returns: string with svgroup transform setSelected(anno, on) Selects/deselects an annotation Parameters: Name Type Default Description anno Annotation The annotation. on bool true Whether to select the annotation. Source: LayerSvgAnnotation.js, line 109 setVisible(visible) Sets a value that indicates whether the layer is visible. Parameters: Name Type Description visible bool The value. Source: LayerSvgAnnotation.js, line 90 × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Layout.html":{"id":"Layout.html","title":"Class: Layout","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocus , the URL is the address of a IIIF server (for instance, 'https://myiiifserver.example/'). See: IIP Server, IIIF tarzoom and itarzoom - This is a custom format of the OpenLIME framework. It can be described as the TAR of a DeepZoom (all the DeepZoom image pyramid is stored in a single file). It takes advantage of the fact that current web servers are able to handle partial-content HTTP requests. Tarzoom facilitates the work of the server, which is not penalised by having to manage a file system with many small files. The URL is the address of the .tzi file (for instance, 'https://my.example/image.tzi'). Warning: tarzoom|itarzoom may not work on older web servers. new Layout(url, type [, options]) Creates a Layout, a container for a raster image. A layout is defined by a url of the image and a type. Additionally, an object literal with Layout options can be specified. Signals are triggered when the layout is ready to be drawn or its size is modified. Parameters: Name Type Argument Description url string URL of the image. type Layout#Type The type of the image. options Object &lt;optional&gt; An object literal describing the layout content. Properties Name Type Default Description width number The total width of the original, unsplit image. This parameter must only be specified for the 'google' layout type. height number The total height of the original, unsplit image. This parameter must only be specified for the 'google' layout type. suffix string 'jpg' The filename suffix of the tiles. subdomains string 'abc' The ('a'|'b'|'c') s subdomain of a Google template URL (for instance: 'https:{s}.my.example//{z}/{x}/{y}.png'). Source: Layout.js, line 56 Methods available() returns the list of tiles available for a rendering Source: Layout.js, line 183 boundingBox() Gets the layout bounding box. Source: Layout.js, line 143 Returns: The layout bounding box. Type BoundingBox getTileURL(id, tile) Gets the URL of a specific tile. The function must be implemented for each layout ody":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Class: PointerManager PointerManager A PointerManager is a high-level class for handling simultaneous events from a DOM target. It captures PointerEvent (MouseEvent and TouchEvent) generated by the target, classifies them as \"gestures\" and provides a simple interface to work with them. The high-level events (gestures) that are detected and emitted are: fingerHover(e) It is fired when a pointing device is used to move the cursor on the target fingerSingleTap(e) It is fired when the user presses a mouse button quickly or touches the screen shortly with a finger fingerDoubleTap(e) It is fired when the user quickly presses a mouse button twice or shortly touches the screen with a finger twice. fingerHold(e) It is fired when the user keeps pressing a mouse button or touching the screen longer than a threshold (600 ms). mouseWheel(e) It is fired when the user rotates the mouse wheel button. panStart(e) It is fired when the pan gesture is starting. panMove(e) It is fired when the pan gesture is in progress. panEnd(e) It is fired when the pan gesture is finished. pinchStart(e1, e2) It is fired when the pinch gesture is starting. pinchMove(e1, e2) It is fired when the pinch gesture is in progress. pinchEnd(e1, e2) It is fired when the pinch gesture is finished. In the following example a pointerManager object is created and connected to the canvas. Then a callback to handle a fingerSingleTap and a fingerHold event is defined and connected to the pointerManager. const canvas = document.querySelector('canvas'); const pointerManager = new PointerManager(canvas); const handler = { priority: 10, fingerSingleTap: (e) =&gt; { console.log(\"SINGLE TAP in \", e.clientX, e.clientY); }); fingerHold: (e) =&gt; { console.log(\"FINGER HOLD in \", e.clientX, e.clientY); }); }; pointerManager.onEvent(handler); new PointerManager(target [, options]) Instatiates a PointerManager object. Parameters: Name Type Argument Description target HTMLElement The DOM element from which the events are generated options Object &lt;optional&gt; An object literal with class parameters. Properties Name Type Default Description diagonal number 27 The diagonal of the screen (in inches). pinchMaxInterval number 200 fingerDown event max distance in time to trigger a pinch (in ms). Source: PointerManager.js, line 36 × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Raster.html":{"id":"Raster.html","title":"Class: Raster","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Class e OpenGL/ES Shading Language (GLSL/ES) with 2.0 amd 3.0 specifications. The Shader class keeps the programmer away from the details of compiling and linking vertex and fragment shaders. The following example creates a fragment shader program using the supplied source code. Once compiled and linked, the shader program is activated in the current WebGLContext. const shader = new OpenLIME.Shader({ 'label': 'Rgb', 'samplers': [{ id: 0, name: 'kd' }] }); // The fragment shader script shader.fragShaderSrc = function (gl) { let gl2 = !(gl instanceof WebGLRenderingContext); let str = `${gl2 ? '#version 300 es' : ''} precision highp float; precision highp int; uniform sampler2D kd; uniform float u_colorFactor; ... return str; }; // Declares a uniform. shader.uniforms = { u_colorFactor: { type: 'float', needsUpdate: true, size: 1, value: 0.0 }, }; // Adds the shader to the Layer and set it as the current one. this.shaders['bw'] = shader; this.setShader('bw'); new Shader( [options]) Instantiates a Shader class. An object literal with Shader options can be specified. Parameters: Name Type Argument Description options Object &lt;optional&gt; An object literal describing the shader content. Properties Name Type Description samplers Array.&lt;Shader#Sampler&gt; An array of pointers to 2D textures. modes Array.&lt;string&gt; An optional array of labels that identify different shader behaviors. Source: Shader.js, line 56 Methods fragShaderSrc(gl) Gets the fragment shader script. This is a virtual function and MUST be redefined in derived classes. Parameters: Name Type Description gl * Thegl context. Source: Shader.js, line 336 Returns: The vertex shader script. Type string setMode(mode) Sets the current mode of the shader Parameters: Name Type Description mode string The mode identifier Source: Shader.js, line 107 setUniform(name, value) Sets the value of a uniform variable. Parameters: Name Type Description name string The name of the uniform variable. value * The value to assign. Source: Shader.js, line 129 vertShaderSrc(gl) Gets the vertex shader script. By default it only applies the view matrix and passes the texture coordinates to the fragment shader. Parameters: Name Type Description gl * Thegl context. Source: Shader.js, line 310 Returns: The vertex shader script. Type string Type Definitions Sampler A reference to a 2D texture. Type: Object Properties: Name Type Description id number A sampler unique identifier. name string The sampler name (the texture reference name in the shader program). label string used for menu samplers array array of rasters {id:, type: } color, normals, etc. * samplers: array of rasters {id:, type: } color, normals, etc. bind: false will not used in preparegl load: false will not be loaded from raster both options are used in neural where the coefficients are loaded, but used by tf uniforms: array type = &lt;vec4|vec3|vec2|float|int&gt;, needsUpdate controls when updated in gl, size is unused, value is and array or a float, we also want to support interpolation: source (value is the target), start, end are the timing (same as camera interpolation) Source: Shader.js, line 4 × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"ShaderBRDF.html":{"id":"ShaderBRDF.html","title":"Class: ShaderBRDF","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRendering e light action is disabled, and the zoomin and zoomout actions are enabled. // Creates an User Interface const ui = new OpenLIME.UIBasic(lime); // Removes light from the toolbar ui.actions.light.display=false; // Adds zoomin and zoomout to the toolbar ui.actions.zoomin.display=true; ui.actions.zoomout.display=true; new UIBasic(viewer [, options]) Instantiates a UIBasic object. Parameters: Name Type Argument Description viewer Viewer The OpenLIME viewer. options Object &lt;optional&gt; An object literal with UIBasic parameters. Properties Name Type Default Description skin string 'skin/skin.svg' The file name of the vector image defining the tool buttons. autofit bool true Whether the initial position of the camera is set to fit the scene model. priority number 0 Higher priority controllers are invoked first. actions Object An Object of UIBasic#Action. A set of default actions are ready to be used. attribution string Some information related to data attribution or credits. menu Array.&lt;UIBasic#MenuEntry&gt; The interface menu structure. enableTooltip bool true Whether to enable tool button tooltip. showLightDirections bool false Whether to draw light direction vectors. Source: UIBasic.js, line 85 Type Definitions Action An Action describes the behaviour of a tool button. Type: Object Properties: Name Type Description title string The nameof the action. display bool Whether to show the action in the toolbar. key string The shortcut key. task callback The callback executed by the action. Source: UIBasic.js, line 9 Action A MenuEntry describes an entry for the menu. Type: Object Properties: Name Type Description title string The menu title. section string The section title. html string A HTML text. task callback The callback executed by the action. Source: UIBasic.js, line 18 × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"UIDialog.html":{"id":"UIDialog.html","title":"Class: UIDialog","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerCon
