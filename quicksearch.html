t.assign(this, options); this.layers = []; //map on layer. } /** * Determines which tiles of a given `layer` are candidates to be downloaded. * Cleans up the cache and schedules the web data fetch. * @param {Layer} layer A layer. */ setCandidates(layer) { if(!this.layers.includes(layer)) this.layers.push(layer); setTimeout(() =&gt; { this.update(); }, 0); //ensure all the queues are set before updating. } /** @ignore */ rateLimited() { if(this.requested &gt; this.maxRequest) return true; if(this.maxRequestsRate == 0) return false; let now = performance.now(); let period = 1000/this.maxRequestsRate; let diff = now - this.lastRequestTimestamp; if(diff &gt; period) return false; if(!this.requestRateTimeout) { this.requestRateTimeout = setTimeout(() =&gt; { this.requestRateTimeout = null; this.update(); }, period -diff + 10); } return true; } /** @ignore */ update() { if(this.rateLimited()) return; let best = this.findBestCandidate(); if(!best) return; while(this.size &gt; this.capacity) { //we need to make room. let worst = this.findWorstTile(); if(!worst) { console.log(\"BIG problem in the cache\"); break; } if(worst.tile.time &lt; best.tile.time) this.dropTile(worst.layer, worst.tile) else return; } console.assert(best != best.layer.queue[0]); best.layer.queue.shift(); this.lastRequestTimestamp = performance.now(); this.loadTile(best.layer, best.tile); } /* Finds the best tile to be downloaded */ /** @ignore */ findBestCandidate() { let best = null; for(let layer of this.layers) { while(layer.queue.length &gt; 0 &amp;&amp; layer.tiles.has(layer.queue[0].index)) { layer.queue.shift(); } if(!layer.queue.length) continue; let tile = layer.queue[0]; if(!best || tile.time &gt; best.tile.time + 1.0 || //old requests ignored tile.priority &gt; best.tile.priority) best = { layer, tile } } return best; } /* Finds the worst tile to be dropped */ /** @ignore */ findWorstTile() { let worst = null; for(let layer of this.layers) { for(let tile of layer.tiles.values()) { //TODO might be some are present when switching shaders. if(tile.missing != 0) continue; if(!worst || tile.time &lt; worst.tile.time || (tile.time == worst.tile.time &amp;&amp; tile.priority &lt; worst.tile.priority)) { worst = {layer, tile}; } } } return worst; } /** @ignore */ loadTile(layer, tile) { this.requested++; (async () =&gt; { layer.loadTile(tile, (size) =&gt; { this.size += size; this.requested--; this.update(); } ); })(); } /** @ignore */ dropTile(layer, tile) { this.size -= tile.size; layer.dropTile(tile); } /** * Flushes all tiles for a `layer`. * @param {Layer} layer A layer. */ flushLayer(layer) { if(!this.layers.includes(layer)) return; for(let tile of layer.tiles.values()) this.dropTile(layer, tile); } } /** * Instantiates a Cache object. Tiles to be fetched are stored in an ordered `queue` in {Layer}. * @classdesc The singleton class **Cache** implements a cache for faster retrieval of the tiles required by layers. * @class Cache * @param {Object} [options] An object literal to define cache parameters. * @param {number} options.capacity=536870912 The total cache capacity (in bytes). * @param {number} options.maxRequest=6 Max number of concurrent HTTP requests. Most common browsers allow six connections per domain. */ let Cache = new _Cache; /** * Flushes all tiles for a `layer`. * @function flushLayer * @memberof Cache * @instance * @param {Layer} layer A layer. */ /** * Determines which tiles of a given `layer` are candidates to be downloaded. * Cleans up the cache and schedules the web data fetch. * @function setCandidates * @memberof Cache * @instance * @param {Layer} layer A layer. */ export { Cache } × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Annotation.js.html":{"id":"Annotation.js.html","title":"Source: Annotation.js","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageL dy: false, //already: converted to svg needsUpdate: true, editing: false, }, options); //TODO label as null is problematic, sort this issue. if(!this.label) this.label = ''; this.elements = []; //assign options is not recursive!!! } /** @ignore */ static UUID() { return 'axxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r &amp; 0x3 | 0x8); return v.toString(16); }); } /** * Gets the bounding box of the annotation. * Note that the coordinates for annotations are always relative to the top left corner of the canvas. * @returns {BoundingBox} The bounding box */ getBBoxFromElements() { let box = null; if(!this.elements.length) { if (this.region == null) { box = new BoundingBox(); } else { const r = this.region; box = new BoundingBox({xLow: r.x, yLow: r.y, xHigh: r.x+r.w, yHigh: r.y+r.h}); } } else { let { x, y, width, height } = this.elements[0].getBBox(); for(let shape of this.elements) { const { sx, sy, swidth, sheight } = shape.getBBox(); x = Math.min(x, sx); y = Math.min(x, sy); width = Math.max(width + x, sx + swidth) - x; height = Math.max(height + y, sy + sheight) - y; } box = new BoundingBox({xLow: x, yLow: y, xHigh: x+width, yHigh: y+width}); } return box; } ///////////////////////////////// /* The class also provides functions for importing and exporting from and to files in JSON format. */ /* * Copies an entry of a JSON file into an **Annotation** object. * @param {string} entry A JSON string representing an annotation. * @returns {Annotation} The annotation. */ /** @ignore */ static fromJsonLd(entry) { if(entry.type != 'Annotation') throw \"Not a jsonld annotation.\"; let options = {id: entry.id}; let rename = { 'identifying': 'code', 'identifying': 'label', 'describing': 'description', 'classifying':'class' }; for(let item of entry.body) { let field = rename[item.purpose]; if(field) options[field] = item.value; } let selector = entry.target &amp;&amp; entry.target.selector; if(selector) { switch(selector.type) { case 'SvgSelector': options.svg = selector.value; options.elements = []; break; default: throw \"Unsupported selector: \" + selector.type; } } return new Annotation(options); } /* * Exports an Annotation to a JSON entry */ /** @ignore */ toJsonLd() { let body = []; if(this.code !== null) body.push( { type: 'TextualBody', value: this.code, purpose: 'indentifying' }); if(this.class !== null) body.push( { type: 'TextualBody', value: this.class, purpose: 'classifying' }); if(this.description !== null) body.push( { type: 'TextualBody', value: this.description, purpose: 'describing' }); let obj = { \"@context\": \"http://www.w3.org/ns/anno.jsonld\", id: this.id, type: \"Annotation\", body: body, target: { selector: {} } } if(this.target) target.selector.source = this.target; if(this.element) { var s = new XMLSerializer(); obj.target.selector.type = 'SvgSelector'; obj.target.selector.value = s.serializeToString(this.element); } } } export { Annotation } × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"LayerSvgAnnotation.js.html":{"id":"LayerSvgAnnotation.js.html","title":"Source: LayerSvgAnnotation.js","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Source: LayerSvgAnnotation.js import { Util } from './Util' import { Layer } from './Layer' import { Annotation } from './Annotation' import { LayerAnnotation } from './LayerAnnotation' import { CoordinateSystem } from './CoordinateSystem'; /** * Elements to classify the annotations. * @typedef {Object} AnnotationClass * @property {color} stroke The CSS color of a line, text or outline SVG element. * @property {string} label The class name. */ /** * Annotation classes. * @typedef {Object.&lt;string, AnnotationClass&gt;} AnnotationClasses */ /** * An annotation layer that draws SVG elements directly on the canvas (outside the WebGL context). * * Here you will find a tutorial to learn how to build a client-server architecture to manage annotations in OpenLIME. //FIXME * * Extends {@link LayerAnnotation}. */ class LayerSvgAnnotation extends LayerAnnotation { /** * Instantiates a LayerSvgAnnotation object. * @param {Object} [options] An object literal with options that inherits from {@link LayerAnnotation}. * @param {AnnotationClasses} options.classes An object literal definying colors and labels of the annotation classes. * @param {Function} options.onClick The callback to fire when the an annotation is clicked on the canvas. The callback is passed an object containing the selected annotation. * @param {bool} options.shadow=true Whether to insert SVG elements in a shadow DOM. */ constructor(options) { options = Object.assign({ overlayElement: null, //reference to canvas overlayElement. TODO: check if really needed. shadow: true, //svg attached as shadow node (so style apply only the svg layer) svgElement: null, //the svg layer svgGroup: null, onClick: null, //callback function classes: { '': { stroke: '#000', label: '' }, }, annotationUpdate: null }, options); super(options); for(const [key, value] of Object.entries(this.classes)) { this.style += `[data-class=${key}] { ` + Object.entries(value).map( g =&gt; `${g[0]}: ${g[1]};`).join('\\n') + '}'; } //this.createOverlaySVGElement(); //this.setLayout(this.layout); } /** @ignore */ createOverlaySVGElement() { this.svgElement = document.createElementNS('http://www.w3.org/2000/svg', 'svg'); this.svgElement.classList.add('openlime-svgoverlay'); this.svgGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g'); this.svgElement.append(this.svgGroup); let root = this.overlayElement; if (this.shadow) root = this.overlayElement.attachShadow({ mode: \"open\" }); if (this.style) { const style = document.createElement('style'); style.textContent = this.style; root.append(style); } root.appendChild(this.svgElement); } /* unused for the moment!!! async loadSVG(url) { var response = await fetch(url); if (!response.ok) { this.status = \"Failed loading \" + this.url + \": \" + response.statusText; return; } let text = await response.text(); let parser = new DOMParser(); this.svgXML = parser.parseFromString(text, \"image/svg+xml\").documentElement; throw \"if viewbox is set in svgURL should it overwrite options.viewbox or viceversa?\" } */ /** * Sets a value that indicates whether the layer is visible. * @param {bool} visible The value. */ setVisible(visible) { if (this.svgElement) this.svgElement.style.display = visible ? 'block' : 'none'; super.setVisible(visible); } /** @ignore */ clearSelected() { if (!this.svgElement) this.createOverlaySVGElement(); // return; this.svgGroup.querySelectorAll('[data-annotation]').forEach((e) =&gt; e.classList.remove('selected')); super.clearSelected(); } /** * Selects/deselects an annotation * @param {Annotation} anno The annotation. * @param {bool} on=true Whether to select the annotation. */ setSelected(anno, on = true) { for (let a of this.svgElement.querySelectorAll(`[data-annotation=\"${anno.id}\"]`)) a.classList.toggle('selected', on); super.setSelected(anno, on); } /** @ignore */ newAnnotation(annotation) { let svg = Util.createSVGElement('svg'); if (!annotation) annotation = new Annotation({ element: svg, selector_type: 'SvgSelector' }); return super.newAnnotation(annotation) } /** @ignore */ draw(transform, viewport) { if (!this.svgElement) return true; this.svgElement.setAttribute('viewBox', `${-viewport.w / 2} ${-viewport.h / 2} ${viewport.w} ${viewport.h}`); const svgTransform = this.getSvgGroupTransform(transform); this.svgGroup.setAttribute(\"transform\", svgTransform); return true; } /** * Return the string containing the transform for drawing the svg group in the proper position * @param {Transform} transform current transform parameter of the draw function * @param {bool} inverse when its false return the transform needed to draw the svgGroup * @returns string with svgroup transform */ getSvgGroupTransform(transform, inverse=false) { let t = this.transform.compose(transform); let c = this.boundingBox().corner(0); // FIXME CHECK IT: Convert from GL to SVG, but without any scaling. It just needs to reflect around 0, t = CoordinateSystem.reflectY(t); return inverse ? `translate(${-c.x} ${-c.y}) scale(${1/t.z} ${1/t.z}) rotate(${t.a} 0 0) translate(${-t.x} ${-t.y})` : `translate(${t.x} ${t.y}) rotate(${-t.a} 0 0) scale(${t.z} ${t.z}) translate(${c.x} ${c.y})`; } /** @ignore */ prefetch(transform) { if (!this.svgElement) this.createOverlaySVGElement(); if (!this.visible) return; if (this.status != 'ready') return; if (typeof (this.annotations) == \"string\") return; //FIXME Is it right? Should we use this.status? const bBox = this.boundingBox(); //this.svgElement.setAttribute('viewBox', `${bBox.xLow} ${bBox.yLow} ${bBox.xHigh - bBox.xLow} ${bBox.yHigh - bBox.yLow}`); //find which annotations needs to be added to the ccanvas, some //indexing whould be used, for the moment we just iterate all of them. for (let anno of this.annotations) { //TODO check for class visibility and bbox culling (or maybe should go to prefetch?) if (!anno.ready &amp;&amp; typeof anno.svg == 'string') { let parser = new DOMParser(); let element = parser.parseFromString(anno.svg, \"image/svg+xml\").documentElement; anno.elements = [...element.children] anno.ready = true; /* } else if(this.svgXML) { a.svgElement = this.svgXML.querySelector(`#${a.id}`); if(!a.svgElement) throw Error(`Could not find element with id: ${id} in svg`); } */ } if(this.annotationUpdate) this.annotationUpdate(anno, transform); if (!anno.needsUpdate) continue; anno.needsUpdate = false; for (let e of this.svgGroup.querySelectorAll(`[data-annotation=\"${anno.id}\"]`)) e.remove(); if (!anno.visible) continue; //second time will be 0 elements, but we need to //store somewhere knowledge of which items in the scene and which still not. for (let child of anno.elements) { let c = child; //.cloneNode(true); c.setAttribute('data-annotation', anno.id); c.setAttribute('data-class', anno.class); //c.setAttribute('data-layer', this.id); c.classList.add('openlime-annotation'); if (this.selected.has(anno.id)) c.classList.add('selected'); this.svgGroup.appendChild(c); c.onpointerdown = (e) =&gt; { if (e.button == 0) { e.preventDefault(); e.stopPropagation(); if (this.onClick &amp;&amp; this.onClick(anno)) return; if (this.selected.has(anno.id)) return; this.clearSelected(); this.setSelected(anno, true); } } //utils /* let parser = new DOMParser(); let use = createElement('use', { 'xlink:href': '#' + a.id, 'stroke-width': 10, 'pointer-events': 'stroke' }); //let use = parser.parseFromString(`&lt;use xlink:href=\"${a.id}\" stroke-width=\"10\" pointer-events=\"stroke\"/&gt;`, \"image/svg+xml\"); this.svgGroup.appendChild(use); */ } } } } Layer.prototype.types['svg_annotations'] = (options) =&gt; { return new LayerSvgAnnotation(options); } export { LayerSvgAnnotation } × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Transform.js.html":{"id":"Transform.js.html","title":"Source: Transform.js","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global crudCallbackcustomDataCallbackcustomStateCallbackRenderingModeselectedCallbacksimplifysmoothsmoothToPathtaskCallback Source: Transform.js import { BoundingBox } from \"./BoundingBox\"; /** * A [x, y] point. * @typedef APoint * @property {number} p.0 The x-coordinate. * @property {number} p.1 The y-coordinate. */ /** * A {x, y} point. * @typedef {Object} Point * @property {number} x The x-coordinate. * @property {number} y The y-coordinate. */ /** * The class **Transform** implements a 2D affine map to convert coordinates between two systems. * The map is internally represented by four values: * * `x` the x-component of the translation vector * * `y` the y-component of the translation vector * * `a` the rotation angle around the z-axis (in degrees) * * `z` the scale factor * * A transformation between a point P to P' is defined by * ``` * P' = z*rot(a)*P + t * ``` * where `z` is the scale factor, `a` is the rotation angle, and `t(x,y)` is the translation vector. * * The class implements a set of geometric transformations useful to position the camera, create animations, etc... */ class Transform { //FIXME Add translation to P? /** * Instantiates a Transform object. * @param {Object} [options] An object literal with Transform parameters. * @param {number} options.x=0 The x-component of the translation vector. * @param {number} options.y=0 The y-component of the translation vector. * @param {number} options.a=0 The rotation angle (in degrees). * @param {number} options.z=1 The scale factor. * @param {time} options.t=0 The current time. */ constructor(options) { Object.assign(this, { x:0, y:0, z:1, a:0, t:0 }); if(!this.t) this.t = performance.now(); if(typeof(options) == 'object') Object.assign(this, options); } /** * Gets a copy of `this` Transform. * @returns {Transform} The copy of the Transform. */ copy() { let transform = new Transform(); Object.assign(transform, this); return transform; } /** * Applies `this` Transform to a point P(x,y) to get P'(x',y'). * @param {number} x x-coordinate of the point P. * @param {number} y y-coordinate of the point P. * @returns {{x, y}} The point P'. */ apply(x, y) { //TODO! ROTATE let r = Transform.rotate(x, y, this.a); return { x: r.x*this.z + this.x, y: r.y*this.z + this.y } } /** * Computes the inverse of `this` Transform. * @returns {Transform} The inverse Transform. */ inverse() { let r = Transform.rotate(this.x/this.z, this.y/this.z, -this.a); return new Transform({x:-r.x, y:-r.y, z:1/this.z, a:-this.a, t:this.t}); } /** * Maps an angle `a` to range from 0 to 360 degrees. * @param {number} a The angle (in degrees). * @returns {number} The normalized angle. */ static normalizeAngle(a) { while(a &gt; 360) a -= 360; while(a &lt; 0) a += 360; return a; } /** * Computes the rotation of a point P(x,y) by an angle `a` around the z-axis to get P'(x',y'). * @param {*} x x-coordinate of the point P. * @param {*} y y-coordinate of the point P. * @param {*} a The rotation angle (in degrees) * @returns {{x,y}} The point P'. */ static rotate(x, y, a) { a = Math.PI*(a/180); let ex = Math.cos(a)*x - Math.sin(a)*y; let ey = Math.sin(a)*x + Math.cos(a)*y; return {x:ex, y:ey}; } // first get applied this (a) then transform (b). /** * Composes (multiplies) `this` Transform with an other `transform`. * @param {Transform} transform * @returns {Transform} The result of the composition. */ compose(transform) { let a = this.copy(); let b = transform; a.z *= b.z; a.a += b.a; var r = Transform.rotate(a.x, a.y, b.a); a.x = r.x*b.z + b.x; a.y = r.y*b.z + b.y; return a; } /** * Applyes `this` Transform to a bounding box. * @param {BoundingBox} lbox * @returns {BoundingBox} The result. */ transformBox(lbox) { let box = new BoundingBox(); for(let i = 0; i &lt; 4; i++) { let c = lbox.corner(i); let p = this.apply(c.x, c.y); box.mergePoint(p); } return box; } /** * Gets the bounding box (in image coordinate space) of the vieport. The viewport y-axis points up. * The image and screen transform has y pointing down. * @param {Viewport} viewport * @returns {BoundingBox} The bounding box. */ getInverseBox(viewport) { let inverse = this.inverse(); let corners = [ {x:viewport.x, y:viewport.y}, {x:viewport.x + viewport.dx, y:viewport.y}, {x:viewport.x, y:viewport.y + viewport.dy}, {x:viewport.x + viewport.dx, y:viewport.y + viewport.dy} ]; let box = new BoundingBox(); for(let corner of corners) { let p = inverse.apply(corner.x -viewport.w/2, -corner.y + viewport.h/2); box.mergePoint(p); } return box; } /** * The type Easing defines the function that regulates the movement of the camera * @typedef {('linear'|'ease-out'|'ease-in-out')} Transform#Easing */ /** * Computes the interpolated transform at time `time` between `source` and `target` * @param {Transform} source The source transform. * @param {Transform} target The target transform. * @param {time} time The time at which to compute the interpolation. * @param {Transform#Easing} easing The easing function. * @returns {Transform} The interpolated transform. */ static interpolate(source, target, time, easing) { //FIXME STATIC const pos = new Transform(); let dt = (target.t - source.t); if (time &lt; source.t) { Object.assign(pos, source); } else if (time &gt; target.t || dt &lt; 0.001) { Object.assign(pos, target); } else { let tt = (time - source.t) / dt; switch (easing) { case 'ease-out': tt = 1 - Math.pow(1 - tt, 2); break; case 'ease-in-out': tt = tt &lt; 0.5 ? 2 * tt * tt : 1 - Math.pow(-2 * tt + 2, 2) / 2; break; } let st = 1 - tt; for (let i of ['x', 'y', 'z', 'a']) pos[i] = (st * source[i] + tt * target[i]); } pos.t = time; return pos; } /** * Combines `this` Transform with the igh=-1e20 The y coordinate of the high corner a rectangle. */ constructor(options) { Object.assign(this, { xLow: 1e20, yLow: 1e20, xHigh: -1e20, yHigh: -1e20 }); Object.assign(this, options); } /** * Defines a bonding box from an array of four elements. * @param {Array&lt;number&gt;} x The array of four elements with the two corners ([xLow, yLow, xHigh, yHigh]). */ fromArray(x) { this.xLow = x[0]; this.yLow = x[1]; this.xHigh = x[2]; this.yHigh = x[3]; } /** * Empties a bounding box. */ toEmpty() { this.xLow = 1e20; this.yLow = 1e20; this.xHigh = -1e20; this.yHigh = -1e20; } /** * Tests weather the bounding box is empty. * @returns {bool} The test result. */ isEmpty() { return this.xLow &gt; this.xHigh || this.yLow &gt; this.yHigh; } /** * Returns an array of four elements containg the low and high corners. * @returns {Array&lt;number&gt;} The array of corners. */ toArray() { return [this.xLow, this.yLow, this.xHigh, this. yHigh]; } /** * Returns a text string with the corner coordinates separated by a space. * @returns {string} The string of corners. */ toString() { return this.xLow.toString() + \" \" + this.yLow.toString() + \" \" + this.xHigh.toString() + \" \" + this.yHigh.toString(); } /** * Merges a `box` to `this` BoundingBox. * @param {BoundingBox} box The bounding box to be merged. */ mergeBox(box) { if (box == null) return; if(this.isEmpty()) Object.assign(this, box); else { this.xLow = Math.min(this.xLow, box.xLow); this.yLow = Math.min(this.yLow, box.yLow); this.xHigh = Math.max(this.xHigh, box.xHigh); this.yHigh = Math.max(this.yHigh, box.yHigh); } } /** * Merges a point `p`{x, y} to `this` BoundingBox. * @param {{x, y}} p The point to be merged. */ mergePoint(p) { this.xLow = Math.min(this.xLow, p.x); this.yLow = Math.min(this.yLow, p.y); this.xHigh = Math.max(this.xHigh, p.x); this.yHigh = Math.max(this.yHigh, p.y); } /** * Translates the bounding box by a displacement vector (dx, dy). * @param {number} dx Displacement along the x-axis. * @param {numb m {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns point in CanvasHtml: 0,0 left,top */ static fromViewportToCanvasHtml(p, camera, useGL) { const viewport = this.getViewport(camera, useGL); let result = this.invertY(p, viewport); return useGL ? this.scale(result, 1/window.devicePixelRatio) : result; } /** * Transform point from CanvasHTML to GLViewport * @param {*} p point in CanvasHtml: 0,0 left,top y Down * @param {Camera} camera Camera * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns point in GLViewport: 0,0 left,bottom, scaled by devicePixelRatio */ static fromCanvasHtmlToViewport(p, camera, useGL) { let result = useGL ? this.scale(p, window.devicePixelRatio) : p; const viewport = this.getViewport(camera, useGL); return this.invertY(result, viewport); } /** * Transform a point from Viewport to Layer coordinates * @param {*} p point {x,y} in Viewport (0,0 left,bottom, y Up) * @param {Camera} camera camera * @param {Transform} layerT layer transform * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns point in Layer coordinates (0, 0 at layer center, y Up) */ static fromViewportToLayer(p, camera, layerT, useGL) { // M = InvLayerT * InvCameraT * Tr(-Vw/2, -Vh/2) const cameraT = this.getCurrentTransform(camera, useGL); const invCameraT = cameraT.inverse(); const invLayerT = layerT.inverse(); const v2c = this.getFromViewportToCenterTransform(camera, useGL); const M = v2c.compose(invCameraT.compose(invLayerT)); // First apply v2c, then invCamera, then invLayer return M.apply(p.x, p.y); } /** * Transform a point from Layer to Viewport coordinates * @param {*} p point {x,y} Layer (0,0 at Layer center y Up) * @param {Camera} camera * @param {Transform} layerT layer transform * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns point in viewport coordinates (0,0 at left,bottom y Up) */ static fromLayerToViewport(p, camera, layerT, useGL) { const M = this.getFromLayerToViewportTransform(camera, layerT, useGL); return M.apply(p.x, p.y); } /** * Transform a point from Layer to Center * @param {*} p point {x,y} in Layer coordinates (0,0 at Layer center) * @param {Camera} camera camera * @param {Transform} layerT layer transform * @returns point in Center (0, 0 at glViewport center) coordinates. */ static fromLayerToCenter(p, camera, layerT, useGL) { // M = cameraT * layerT const cameraT = this.getCurrentTransform(camera, useGL); const M = layerT.compose(cameraT); return M.apply(p.x, p.y); } ////////////// CHECKED UP TO HERE //////////////////// /** * Transform a point from Layer to Image coordinates * @param {*} p point {x, y} Layer coordinates (0,0 at Layer center) * @param {*} layerSize {w, h} Size in pixel of the Layer * @returns Point in Image coordinates (0,0 at left,top, y Down) */ static fromLayerToImage(p, layerSize) { // InvertY * Tr(Lw/2, Lh/2) let result = {x: p.x + layerSize.w/2, y: p.y + layerSize.h/2}; return this.invertY(result, layerSize); } /** * Transform a point from CanvasHtml to Scene * @param {*} p point {x, y} in CanvasHtml (0,0 left,top, y Down) * @param {Camera} camera camera * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns Point in Scene coordinates (0,0 at scene center, y Up) */ static fromCanvasHtmlToScene(p, camera, useGL) { // invCameraT * Tr(-Vw/2, -Vh/2) * InvertY * [Scale(devPixRatio)] let result = this.fromCanvasHtmlToViewport(p, camera, useGL); const v2c = this.getFromViewportToCenterTransform(camera, useGL); const invCameraT = this.getCurrentTransform(camera, useGL).inverse(); const M = v2c.compose(invCameraT); return M.apply(result.x, result.y); } /** * Transform a point from Scene to CanvasHtml * @param {*} p point {x, y} Scene coordinates (0,0 at scene center, y Up) * @param {Camera} camera camera * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns Point in CanvasHtml (0,0 left,top, y Down) */ static fromSceneToCanvasHtml(p, camera, useGL) { // invCameraT * Tr(-Vw/2, -Vh/2) * InvertY * [Scale(devPixRatio)] let result = this.fromSceneToViewport(p, camera, useGL) return this.fromViewportToCanvasHtml(result, camera, useGL); } /** * Transform a point from Scene to Viewport * @param {*} p point {x, y} Scene coordinates (0,0 at scene center, y Up) * @param {Camera} camera camera * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns Point in Viewport (0,0 left,bottom, y Up) */ static fromSceneToViewport(p, camera, useGL) { // FromCenterToViewport * CamT const c2v = this.getFromViewportToCenterTransform(camera, useGL).inverse(); const CameraT = this.getCurrentTransform(camera, useGL); const M = CameraT.compose(c2v); return M.apply(p.x, p.y); } /** * Transform a point from Scene to Viewport, using given transform and viewport * @param {*} p point {x, y} Scene coordinates (0,0 at scene center, y Up) * @param {Transform} cameraT camera transform * @param {*} viewport viewport {x,y,dx,dy,w,h} * @returns Point in Viewport (0,0 left,bottom, y Up) */ static fromSceneToViewportNoCamera(p, cameraT, viewport) { // invCameraT * Tr(-Vw/2, -Vh/2) * InvertY * [Scale(devPixRatio)] const c2v = this.getFromViewportToCenterTransformNoCamera(viewport).inverse(); const M = cameraT.compose(c2v); return M.apply(p.x, p.y); } /** * Transform a point from Viewport to Scene. * @param {*} p point {x, y} Viewport coordinates (0,0 at left,bottom, y Up) * @param {Camera} camera camera * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns Point in Viewport (0,0 at scene center, y Up) */ static fromViewportToScene(p, camera, useGL) { // invCamT * FromViewportToCenter const v2c = this.getFromViewportToCenterTransform(camera, useGL); const invCameraT = this.getCurrentTransform(camera, useGL).inverse(); const M = v2c.compose(invCameraT); return M.apply(p.x, p.y); } /** * Transform a point from Viewport to Scene, using given transform and viewport * @param {*} p point {x, y} Viewport coordinates (0,0 at left,bottom, y Up) * @param {Transform} cameraT camera transform * @param {*} viewport viewport {x,y,dx,dy,w,h} * @returns Point in Viewport (0,0 at scene center, y Up) */ static fromViewportToSceneNoCamera(p, cameraT, viewport) { // invCamT * FromViewportToCenter const v2c = this.getFromViewportToCenterTransformNoCamera(viewport); const invCameraT = cameraT.inverse(); const M = v2c.compose(invCameraT); return M.apply(p.x, p.y); } /** * Transform a point from CanvasHtml to Image * @param {*} p point {x, y} in CanvasHtml (0,0 left,top, y Down) * @param {Camera} camera camera * @param {Transform} layerT layer transform * @param {*} layerSize {w, h} Size in pixel of the Layer * @param {bool} applyGLScale if true apply devPixelRatio scale. Keep it false when working with SVG * @returns Point in Image space (0,0 left,top of the image, y Down) */ static fromCanvasHtmlToImage(p, camera, layerT, layerSize, useGL) { // Translate(Lw/2, Lh/2) * InvLayerT * InvCameraT * Translate(-Vw/2, -Vh/2) * invertY * [Scale(devicePixelRatio)] // in other words... fromLayerToImage * invLayerT * fromCanvasHtmlToScene let result = this.fromCanvasHtmlToScene(p, camera, useGL); const invLayerT = layerT.inverse(); result = invLayerT.apply(result.x, result.y); result = this.fromLayerToImage(result, layerSize); return result; } /** * Transform a box from Viewport to Image coordinates * @param {BoundingBox} box in Viewport coordinates (0,0 at left,bottom, y Up) * @param {Transform} cameraT camera Transform * @param {*} viewport {x,y,dx,dy,w,h} * @param {Transform} layerT layer transform * @param {*} layerSize {w,h} layer pixel size * @returns box in Image coordinates (0,0 left,top, y Dowm) */ static fromViewportBoxToImageBox(box, cameraT, viewport, layerT, layerSize) { // InvertYonImage * T(Lw/2, Lh/2) * InvL * InvCam * T(-Vw/2,-Vh/2) let V2C = new Transform({x:-viewport.w/2, y:-viewport.h/2}); let C2S = cameraT.inverse(); let S2L = layerT.inverse(); let L2I = new Transform({x:layerSize.w/2, y:layerSize.h/2}); let M = V2C.compose(C2S.compose(S2L.compose(L2I))); let resultBox = new BoundingBox(); for(let i = 0; i &lt; 4; ++i) { let p = box.corner(i); p = M.apply(p.x, p.y); p = CoordinateSystem.invertY(p, layerSize); resultBox.mergePoint(p); } return resultBox; } /** * Transform a box from Layer to Scene * @param {BoundingBox} box box in Layer coordinates (0,0 at layer center) * @param {Transform} layerT layer transform * @returns box in Scene coordinates (0,0 at scene center) */ static fromLayerBoxToSceneBox(box, layerT) { return layerT.transformBox(box); } /** * Transform a box from Scene to Layer * @param {BoundingBox} box box in Layer coordinates (0,0 at layer center) * @param {Transform} layerT layer transform * @returns box in Scene coordinates (0,0 at scene center) */ static fromSceneBoxToLayerBox(box, layerT) { return layerT.inverse().transformBox(box); } /** * Transform a box from Layer to Viewport coordinates * @param {BoundingBox} box box in Layer coordinates (0,0 at Layer center y Up) * @param {Camera} camera * @param {Transform} layerT layer transform * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns Box in Viewport coordinates (0,0 at left, bottom y Up) */ static fromLayerBoxToViewportBox(box, camera, layerT, useGL) { const M = this.getFromLayerToViewportTransform(camera, layerT, useGL); return M.transformBox(box); } /** * Transform a box from Layer to Viewport coordinates * @param {BoundingBox} box box in Layer coordinates (0,0 at Layer center y Up) * @param {Camera} camera * @param {Transform} layerT layer transform * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns Box in Viewport coordinates (0,0 at left, bottom y Up) */ static fromViewportBoxToLayerBox(box, camera, layerT, useGL) { const M = this.getFromLayerToViewportTransform(camera, layerT, useGL).inverse(); return M.transformBox(box); } /** * Get a transform to go from viewport 0,0 at left, bottom y Up, to Center 0,0 at viewport center * @param {Camera} camera camera * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns transform from Viewport to Center */ static getFromViewportToCenterTransform(camera, useGL) { const viewport = this.getViewport(camera, useGL); return this.getFromViewportToCenterTransformNoCamera(viewport); } /** * Get a transform to go from viewport 0,0 at left, bottom y Up, to Center 0,0 at viewport center * from explicit viewport param. (Not using camera parameter here) * @param {*} viewport viewport * @returns transform from Viewport to Center */ static getFromViewportToCenterTransformNoCamera(viewport) { return new Transform({x:viewport.x-viewport.w/2, y:viewport.y-viewport.h/2, z:1, a:0, t:0}); } /** * Return transform with y reflected wrt origin (y=-y) * @param {Transform} t * @returns {Transform} transform, with y reflected (around 0) */ static reflectY(t) { return new Transform({x:t.x, y:-t.y, z:t.z, a:t.a, t:t.t}); } /** * Get a transform to go from Layer (0,0 at Layer center y Up) to Viewport (0,0 at left,bottom y Up) * @param {Camera} camera * @param {Transform} layerT layer transform * @param {bool} useGL True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale * @returns transform from Layer to Viewport */ static getFromLayerToViewportTransform(camera, layerT, useGL) { // M = Center2Viewport * CameraT * LayerT const cameraT = this.getCurrentTransform(camera, useGL); const c2v = this.getFromViewportToCenterTransform(camera, useGL).inverse(); const M = layerT.compose(cameraT.compose(c2v)); return M; } /** * Get a transform to go from Layer (0,0 at Layer center y Up) to Viewport (0,0 at left,bottom y Up) * @param {Transform} CameraT camera transform * @param {viewport} viewport {x,y,dx,dy,w,h} viewport * @param {Transform} layerT layer transform * @returns transform from Layer to Viewport */ static getFromLayerToViewportTransformNoCamera(cameraT, viewport, layerT) { // M = Center2Viewport * CameraT * LayerT const c2v = this.getFromViewportToCenterTransformNoCamera(viewport).inverse(); const M = layerT.compose(cameraT.compose(c2v)); return M; } /** * Scale x applying f scale factor * @param {*} p Point to be scaled * @param {Number} f Scale factor * @returns Point in CanvasContext (Scaled by devicePixelRation) */ static scale(p, f) { return { x:p.x * f, y:p.y * f}; } /** * Invert y with respect to viewport.h * @param {*} p Point to be transformed * @param {*} viewport current viewport * @returns Point with y inverted with respect to viewport.h */ static invertY(p, viewport) { return {x:p.x, y:viewport.h - p.y}; } /** * Return the camera viewport: scaled by devicePixelRatio if useGL is true. * @param {bool} useGL True to work with WebGL, false for SVG. When true viewport scaled by devPixelRatio * @returns Viewport */ static getViewport(camera, useGL) { return useGL ? camera.glViewport() : camera.viewport; } static getCurrentTransform(camera, useGL) { let cameraT = useGL ? camera.getGlCurrentTransform(performance.now()) : camera.getCurrentTransform(performance.now()); return cameraT; } } export { CoordinateSystem } × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"EditorSvgAnnotation.js.html":{"id":"EditorSvgAnnotation.js.html","title":"Source: EditorSvgAnnotation.js","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManagerRa nno = new OpenLIME.Layer(aOptions); * lime.addLayer('anno', anno); * * // Creates a SVG annotation Editor * const editor = new OpenLIME.EditorSvgAnnotation(lime, anno, { * viewer: lime, * classes: classParam * }); * editor.createCallback = (anno) =&gt; { console.log(\"Created annotation: \", anno); processRequest(anno, 'create'); return true; }; * editor.updateCallback = (anno) =&gt; { console.log(\"Updated annotation: \", anno); processRequest(anno, 'update'); return true; }; * editor.deleteCallback = (anno) =&gt; { console.log(\"Deleted annotation: \", anno); processRequest(anno, 'delete'); return true; }; * ``` */ class EditorSvgAnnotation { /** * Instatiates a EditorSvgAnnotation object. * @param {Viewer} viewer The OpenLIME viewer. * @param {LayerSvgAnnotation} layer The annotation layer on which to operate. * @param {Object} [options] An object literal with SVG editor parameters. * @param {AnnotationClasses} options.classes An object literal definying colors and labels of the annotation classes. * @param {crudCallback} options.createCallback The callback to implement annotation creation. * @param {crudCallback} options.updateCallback The callback to implement annotation update. * @param {crudCallback} options.deleteCallback The callback to implement annotation deletion. * @param {bool} options.enableState=false Whether to enable custom annotation state. This allows to include some state variables into an annotation item (such as camera, light or lens position). * @param {customStateCallback} options.customState The callback implementing custom state annotations. * @param {customDataCallback} options.customData The callback to customize the annotation data object. * @param {selectedCallback} options.selectedCallback The callback executed when an annotation is selcted on the user interface. */ constructor(viewer, layer, options) { this.layer = layer; Object.assign(this, { viewer: viewer, panning: false, tool: null, //doing nothing, could: ['line', 'polygon', 'point', 'box', 'circle'] startPoint: null, //starting point for box and circle currentLine: [], annotation: null, priority: 20000, classes: { '': { stroke: '#000', label: '' }, 'class1': { stroke: '#770', label: '' }, 'class2': { stroke: '#707', label: '' }, 'class3': { stroke: '#777', label: '' }, 'class4': { stroke: '#070', label: '' }, 'class5': { stroke: '#007', label: '' }, 'class6': { stroke: '#077', label: '' }, }, tools: { point: { img: '&lt;svg width=24 height=24&gt;&lt;circle cx=12 cy=12 r=3 fill=\"red\" stroke=\"gray\"/&gt;&lt;/svg&gt;', tooltip: 'New point', tool: Point, }, pin: { template: (x,y) =&gt; { return `&lt;svg xmlns='http://www.w3.org/2000/svg' x='${x}' y='${y}' width='4%' height='4%' class='pin' viewBox='0 0 18 18'&gt;&lt;path d='M 0,0 C 0,0 4,0 8,0 12,0 16,4 16,8 16,12 12,16 8,16 4,16 0,12 0,8 0,4 0,0 0,0 Z'/&gt;&lt;text class='pin-text' x='7' y='8'&gt;${this.annotation.idx}&lt;/text&gt;&lt;/svg&gt;`; }, //pin di alcazar 1. url a svg 2. txt (stringa con svg) 3. funzione(x,y) ritorna svg 4. dom (da skin). tooltip: 'New pin', tool: Pin }, pen: { img: '&lt;svg width=24 height=24&gt;&lt;circle cx=12 cy=12 r=3 fill=\"red\" stroke=\"gray\"/&gt;&lt;/svg&gt;', tooltip: 'New polyline', tool: Pen, }, line: { img: `&lt;svg width=24 height=24&gt; &lt;path d=\"m 4.7,4.5 c 0.5,4.8 0.8,8.5 3.1,11 2.4,2.6 4.2,-4.8 6.3,-5 2.7,-0.3 5.1,9.3 5.1,9.3\" stroke-width=\"3\" fill=\"none\" stroke=\"grey\"/&gt; &lt;path d=\"m 4.7,4.5 c 0.5,4.8 0.8,8.5 3.1,11 2.4,2.6 4.2,-4.8 6.3,-5 2.7,-0.3 5.1,9.3 5.1,9.3\" stroke-width=\"1\" fill=\"none\" stroke=\"red\"/&gt;&lt;/svg&gt;`, tooltip: 'New line', tool: Line, }, erase: { img: '', tooltip: 'Erase lines', tool: Erase, }, box: { img: '&lt;svg width=24 height=24&gt;&lt;rect x=5 y=5 width=14 height=14 fill=\"red\" stroke=\"gray\"/&gt;&lt;/svg&gt;', tooltip: 'New box', tool: Box, }, circle: { img: '&lt;svg width=24 height=24&gt;&lt;circle cx=12 cy=12 r=7 fill=\"red\" stroke=\"gray\"/&gt;&lt;/svg&gt;', tooltip: 'New circle', tool: Circle, }, /* colorpick: { img: '', tooltip: 'Pick a color', tool: Colorpick, } */ }, annotation: null, //not null only when editWidget is shown. enableState: false, customState: null, customData: null, editWidget: null, selectedCallback: null, createCallback: null, //callbacks for backend updateCallback: null, deleteCallback: null }, options); layer.style += Object.entries(this.classes).map((g) =&gt; { console.assert(g[1].hasOwnProperty('stroke'), \"Classes needs a stroke property\"); return `[data-class=${g[0]}] { stroke:${g[1].stroke}; }`; }).join('\\n'); //at the moment is not really possible to unregister the events registered here. viewer.pointerManager.onEvent(this); document.addEventListener('keyup', (e) =&gt; this.keyUp(e), false); layer.addEvent('selected', (anno) =&gt; { if (!anno || anno == this.annotation) return; if(this.selectedCallback) this.selectedCallback(anno); this.showEditWidget(anno); }); layer.annotationsEntry = () =&gt; { let entry = { html: `&lt;div class=\"openlime-tools\"&gt;&lt;/div&gt;`, list: [], //will be filled later. classes: 'openlime-annotations', status: () =&gt; 'active', oncreate: () =&gt; { if (Array.isArray(layer.annotations)) layer.createAnnotationsList(); let tools = { 'add': { action: () =&gt; { this.createAnnotation(); }, title: \"New annotation\" }, 'edit': { action: () =&gt; { this.toggleEditWidget(); }, title: \"Edit annotations\" }, 'export': { action: () =&gt; { this.exportAnnotations(); }, title: \"Export annotations\" }, 'trash': { action: () =&gt; { this.deleteSelected(); }, title: \"Delete selected annotations\" }, }; (async () =&gt; { for (const [label, tool] of Object.entries(tools)) { let icon = await Skin.appendIcon(entry.element.firstChild, '.openlime-' + label); // TODO pass entry.element.firstChild as parameter in onCreate icon.setAttribute('title', tool.title); icon.addEventListener('click', tool.action); } })(); } } layer.annotationsListEntry = entry; return entry; } } /** @ignore */ createAnnotation() { let anno = this.layer.newAnnotation(); if(this.customData) this.customData(anno); if(this.enableState) this.setAnnotationCurrentState(anno); anno.idx = this.layer.annotations.length; anno.publish = 1; anno.label = anno.description = anno.class = ''; let post = { id: anno.id, idx: anno.idx, label: anno.label, description: anno.description, 'class': anno.class, svg: null, publish: anno.publish, data: anno.data }; if (this.enableState) post = { ...post, state: anno.state }; if (this.createCallback) { let result = this.createCallback(post); if (!result) alert(\"Failed to create annotation!\"); } this.layer.setSelected(anno); } /** @ignore */ toggleEditWidget() { if (this.annotation) return this.hideEditWidget(); let id = this.layer.selected.values().next().value; if (!id) return; let anno = this.layer.getAnnotationById(id); this.showEditWidget(anno); } /** @ignore */ updateEditWidget() { let anno = this.annotation; let edit = this.editWidget; if (!anno.class) anno.class = ''; edit.querySelector('[name=label]').value = anno.label || ''; edit.querySelector('[name=description]').value = anno.description || ''; edit.querySelector('[name=idx]').value = anno.idx || ''; Object.entries(anno.data).map(k =&gt; { edit.querySelector(`[name=data-data-${k[0]}]`).value = k[1] || ''; }); edit.querySelector('[name=classes]').value = anno.class; edit.querySelector('[name=publish]').checked = anno.publish == 1; edit.classList.remove('hidden'); let button = edit.querySelector('.openlime-select-button'); button.textContent = this.classes[anno.class].label; button.style.background = this.classes[anno.class].stroke; } /** @ignore */ showEditWidget(anno) { this.annotation = anno; this.setTool(null); this.setActiveTool(); this.layer.annotationsListEntry.element.querySelector('.openlime-edit').classList.add('active'); (async () =&gt; { await this.createEditWidget(); this.updateEditWidget(); })(); } /** @ignore */ hideEditWidget() { this.annotation = null; this.setTool(null); this.editWidget.classList.add('hidden'); this.layer.annotationsListEntry.element.querySelector('.openlime-edit').classList.remove('active'); } //TODO this should actually be in the html. /** @ignore */ async createEditWidget() { if (this.editWidget) return; let html = ` &lt;div class=\"openlime-annotation-edit\"&gt; &lt;label for=\"label\"&gt;Title:&lt;/label&gt; &lt;input name=\"label\" type=\"text\"&gt;&lt;br&gt; &lt;label for=\"description\"&gt;Description:&lt;/label&gt;&lt;br&gt; &lt;textarea name=\"description\" cols=\"30\" rows=\"5\"&gt;&lt;/textarea&gt;&lt;br&gt; &lt;span&gt;Class:&lt;/span&gt; &lt;div class=\"openlime-select\"&gt; &lt;input type=\"hidden\" name=\"classes\" value=\"\"/&gt; &lt;div class=\"openlime-select-button\"&gt;&lt;/div&gt; &lt;ul class=\"openlime-select-menu\"&gt; ${Object.entries(this.classes).map((c) =&gt; `&lt;li data-class=\"${c[0]}\" style=\"background:${c[1].stroke};\"&gt;${c[1].label}&lt;/li&gt;`).join('\\n')} &lt;/ul&gt; &lt;/div&gt; &lt;label for=\"idx\"&gt;Index:&lt;/label&gt; &lt;input name=\"idx\" type=\"text\"&gt;&lt;br&gt; ${Object.entries(this.annotation.data).map(k =&gt; { let label = k[0]; let str = `&lt;label for=\"data-data-${k[0]}\"&gt;${label}:&lt;/label&gt; &lt;input name=\"data-data-${k[0]}\" type=\"text\"&gt;&lt;br&gt;` return str; }).join('\\n')} &lt;br&gt; &lt;span&gt;&lt;button class=\"openlime-state\"&gt;SAVE&lt;/button&gt;&lt;/span&gt; &lt;span&gt;&lt;input type=\"checkbox\" name=\"publish\" value=\"\"&gt; Publish&lt;/span&gt;&lt;br&gt; &lt;div class=\"openlime-annotation-edit-tools\"&gt;&lt;/div&gt; &lt;/div&gt;`; let template = document.createElement('template'); template.innerHTML = html.trim(); let edit = template.content.firstChild; let select = edit.querySelector('.openlime-select'); let button = edit.querySelector('.openlime-select-button'); let ul = edit.querySelector('ul'); let options = edit.querySelectorAll('li'); let input = edit.querySelector('[name=classes]'); let state = edit.querySelector('.openlime-state'); state.addEventListener('click', (e) =&gt; { if(this.enableState) this.setAnnotationCurrentState(this.annotation); this.saveCurrent(); this.saveAnnotation(); }); button.addEventListener('click', (e) =&gt; { e.stopPropagation(); for (let o of options) o.classList.remove('selected'); select.classList.toggle('active'); }); ul.addEventListener('click', (e) =&gt; { e.stopPropagation(); input.value = e.srcElement.getAttribute('data-class'); input.dispatchEvent(new Event('change')); button.style.background = this.classes[input.value].stroke; button.textContent = e.srcElement.textContent; select.classList.toggle('active'); }); document.addEventListener('click', (e) =&gt; { select.classList.remove('active'); }); document.querySelector('.openlime-layers-menu').appendChild(edit); let tools = edit.querySelector('.openlime-annotation-edit-tools'); let pin = await Skin.appendIcon(tools, '.openlime-pin'); pin.addEventListener('click', (e) =&gt; { this.setTool('pin'); this.setActiveTool(pin); }); let draw = await Skin.appendIcon(tools, '.openlime-draw'); draw.addEventListener('click', (e) =&gt; { this.setTool('line'); this.setActiveTool(draw); }); // let pen = await Skin.appendIcon(tools, '.openlime-pen'); // pen.addEventListener('click', (e) =&gt; { this.setTool('pen'); setActive(pen); }); let erase = await Skin.appendIcon(tools, '.openlime-erase'); erase.addEventListener('click', (e) =&gt; { this.setTool('erase'); this.setActiveTool(erase); }); let undo = await Skin.appendIcon(tools, '.openlime-undo'); undo.addEventListener('click', (e) =&gt; { this.undo(); }); let redo = await Skin.appendIcon(tools, '.openlime-redo'); redo.addEventListener('click', (e) =&gt; { this.redo(); }); /* let colorpick = await Skin.appendIcon(tools, '.openlime-colorpick'); undo.addEventListener('click', (e) =&gt; { this.pickColor(); }); */ let label = edit.querySelector('[name=label]'); label.addEventListener('blur', (e) =&gt; { if (this.annotation.label != label.value) this.saveCurrent(); this.saveAnnotation(); }); let descr = edit.querySelector('[name=description]'); descr.addEventListener('blur', (e) =&gt; { if (this.annotation.description != descr.value) this.saveCurrent(); this.saveAnnotation(); }); let idx = edit.querySelector('[name=idx]'); idx.addEventListener('blur', (e) =&gt; { if (this.annotation.idx != idx.value) { const svgPinIdx = this.annotation.elements[0]; if(svgPinIdx) { const txt = svgPinIdx.querySelector(\".pin-text\"); if(txt) { txt.textContent = idx.value; } } this.saveCurrent(); } this.saveAnnotation(); }); Object.entries(this.annotation.data).map(k =&gt; { let dataElm = edit.querySelector(`[name=data-data-${k[0]}]`); dataElm.addEventListener('blur', (e) =&gt; { if (this.annotation.data[k[0]] != dataElm.value) this.saveCurrent(); this.saveAnnotation(); }); }); let classes = edit.querySelector('[name=classes]'); classes.addEventListener('change', (e) =&gt; { if (this.annotation.class != classes.value) this.saveCurrent(); this.saveAnnotation(); }); let publish = edit.querySelector('[name=publish]'); publish.addEventListener('change', (e) =&gt; { if (this.annotation.publish != publish.value) this.saveCurrent(); this.saveAnnotation(); }); edit.classList.add('hidden'); this.editWidget = edit; } /** @ignore */ setAnnotationCurrentState(anno) { anno.state = window.structuredClone(this.viewer.canvas.getState()); // Callback to add light/lens params or other data if(this.customState) this.customState(anno); } /** @ignore */ saveAnnotation() { let edit = this.editWidget; let anno = this.annotation; anno.label = edit.querySelector('[name=label]').value || ''; anno.description = edit.querySelector('[name=description]').value || ''; anno.idx = edit.querySelector('[name=idx]').value || '0'; Object.entries(anno.data).map(k =&gt; { anno.data[k[0]] = edit.querySelector(`[name=data-data-${k[0]}]`).value || ''; }); anno.publish = edit.querySelector('[name=publish]').checked ? 1 : 0; let select = edit.querySelector('[name=classes]'); anno.class = select.value || ' port { CoordinateSystem } from \"./CoordinateSystem\"; /** * The FocusContext class is responsible for identifying a good Focus and Context situation. * During interaction it distributes user inputs on lens, into camera and lens movement * in order to keep the lens in focus and context situation, within the viewport, with enough * space between the lens and the viewport boundaries, for both panning and zooming actions. * It also computes a good transform given a lens to properly display the lens within * the current viewport (used for stored annotations) */ class FocusContext { /** * Subdivide pan amount (delta) between lens (focus) and camera transform (context). * @param {*} viewport {x, y, dx, dy, w, h} * @param {*} focus lens : {position,radius}. Contain current lens in dataset coords, which will be updated to translated lens * @param {Transform} context Contain current transform, which will be updated to translated context * @param {Number} delta amount of pan in dataset pixels * @param {*} imageSize {w,h} Size of the dataset width height (to clamp movement on boundaries) */ static pan(viewport, focus, context, delta, imageSize) { let txy = this.getAmountOfFocusContext(viewport, focus, context, delta); // When t is 1: already in focus&amp;context, move only the lens. // When t is 0.5: border situation, move both focus &amp; context to keep the lens steady on screen. // In this case the context should be moved of deltaFocus*scale to achieve steadyness. // Thus interpolate deltaContext between 0 and deltaFocus*s (with t ranging from 1 to 0.5) const deltaFocus = {x:delta.x * txy.x, y: delta.y * txy.y}; const deltaContext = {x:-deltaFocus.x * context.z * 2 * (1-txy.x), y:-deltaFocus.y * context.z * 2 * (1-txy.y)}; context.x += deltaContext.x; context.y += deltaContext.y; focus.position.x += deltaFocus.x; focus.position.y += deltaFocus.y; // Clamp lens position on dataset boundaries if (Math.abs(focus.position.x) &gt; imageSize.w/2) { focus.position.x = imageSize.w/2 * Math.sign(focus.position.x); } if (Math.abs(focus.position.y) &gt; imageSize.h/2) { focus.position.y = imageSize.h/2 * Math.sign(focus.position.y); } } /** * Distribute scale between radius and camera scale in order to keep focus and context situation * @param {Camera} camera * @param {*} focus lens : {position,radius}. Contain current lens in dataset coords, which will be updated to translated lens * @param {Transform} context Contain current transform, which will be updated to translated context * @param {Number} dz amount of scale (which should multiply scale) */ static scale(camera, focus, context, dz) { const viewport = camera.viewport; const radiusRange = this.getRadiusRangeCanvas(viewport); const r = focus.radius * context.z; // Distribute lens scale between radius scale and context scale // When radius is going outside radius boundary, scale of the inverse amounts radius and zoom scale | screen size constant // When radius is changing from boundary condition to a valid one change only radius and no change to zoom scale. // From 0.5 to boundary condition, zoomScale vary is interpolated between 1 and 1/dz. const t = Math.max(0, Math.min(1, (r - radiusRange.min) / (radiusRange.max - radiusRange.min))); let zoomScaleAmount = 1; if (dz &gt; 1 &amp;&amp; t &gt; 0.5) { const t1 = (t - 0.5)*2; zoomScaleAmount = 1 * (1-t1) + t1 / dz; } else if (dz &lt; 1 &amp;&amp; t &lt; 0.5) { const t1 = 2 * t; zoomScaleAmount = (1 - t1) / dz + t1 * 1; } let radiusScaleAmount = dz; const newR = r * radiusScaleAmount; // Clamp radius if (newR &lt; radiusRange.min) { radiusScaleAmount = radiusRange.min / r; } else if (newR &gt; radiusRange.max) { radiusScaleAmount = radiusRange.max / r; } // Clamp scale if (context.z * zoomScaleAmount &lt; camera.minZoom) { zoomScaleAmount = camera.minZoom / context.z; } else if (context.z * zoomScaleAmount &gt; camera.maxZoom) { zoomScaleAmount = camera.maxZoom / context.z; } // Scale around lens center context.x += focus.position.x*context.z*(1 - zoomScaleAmount); context.y += focus.position.y*context.z*(1 - zoomScaleAmount); context.z = context.z * zoomScaleAmount; focus.radius *= radiusScaleAmount; } /** * Adapt context in order to have focus &amp; context condition satisfied for the requested focus * @param {*} viewport {x, y, dx, dy, w, h} * @param {*} focus lens : {position,radius}. Contain current lens in dataset coords * @param {Transform} context Contain current transform, which will be updated to translated context * @param {Number} desiredScale context desired scale (which will be clamped within min max scale) */ static adaptContext(viewport, focus, context, desiredScale) { // Get current projected annotation center position //const pOld = context.sceneToViewportCoords(viewport, focus.position); const useGL = true; const pOld = CoordinateSystem.fromSceneToViewportNoCamera(focus.position, context, viewport, useGL); context.z = desiredScale; FocusContext.adaptContextScale(viewport, focus, context); // After scale, restore projected annotation position, in order to avoid // moving the annotation center outside the boundaries //const pNew = context.sceneToViewportCoords(viewport, focus.position); const pNew = CoordinateSystem.fromSceneToViewportNoCamera(focus.position, context, viewport, useGL); const delta = [pNew.x - pOld.x, pNew.y - pOld.y]; context.x -= delta.x; context.y += delta.y; // Force annotation inside the viewport FocusContext.adaptContextPosition(viewport, focus, context); } /** * Fix context scale to make projected lens fit within viewport. * @param {*} viewport {x, y, dx, dy, w, h} * @param {*} focus lens : {position,radius}. Contain current lens in dataset coords * @param {Transform} context Contain current transform, whose scale will be updated to keep lens in focus and context after scale */ static adaptContextScale(viewport, focus, context) { const oldZ = context.z; const radiusRange = this.getRadiusRangeCanvas(viewport); const focusRadiusCanvas = focus.radius * context.z; let zoomScaleAmount = 1; if (focusRadiusCanvas &lt; radiusRange.min) { context.z = radiusRange.min / focus.radius; // zoomScaleAmount = (radiusRange.min / focus.radius) / context.z; } else if (focusRadiusCanvas &gt; radiusRange.max) { context.z = radiusRange.max / focus.radius; // zoomScaleAmount = (radiusRange.max / focus.radius) / context.z; } } /** * Translate context in order to put lens (focus) in focus and context condition * @param {*} viewport {x,y,dx,dy,w,h} * @param {*} focus lens : {position,radius} * @param {Transform} context */ static adaptContextPosition(viewport, focus, context) { const delta = this.getCanvasBorder(focus, context); let box = this.getShrinkedBox(viewport, delta); const useGL = true; const screenP = CoordinateSystem.fromSceneToViewportNoCamera(focus.position, context, viewport, useGL); const deltaMinX = Math.max(0, (box.xLow - screenP.x)); const deltaMaxX = Math.min(0, (box.xHigh - screenP.x)); context.x += deltaMinX != 0 ? deltaMinX : deltaMaxX; const deltaMinY = Math.max(0, (box.yLow - screenP.y)); const deltaMaxY = Math.min(0, (box.yHigh - screenP.y)); context.y += deltaMinY != 0 ? deltaMinY : deltaMaxY; } /** * @ignore */ static getAmountOfFocusContext(viewport, focus, context, panDir) { // Returns a value t which is used to distribute pan between focus and context. // Return a value among 0.5 and 1. 1 is full focus and context, // 0.5 is borderline focus and context. const delta = this.getCanvasBorder(focus, context); const box = this.getShrinkedBox(viewport, delta); // const p = context.sceneToViewportCoords(viewport, focus.position); const useGL = true; const p = CoordinateSystem.fromSceneToViewportNoCamera(focus.position, context, viewport, useGL); const halfCanvasW = viewport.w / 2 - delta; const halfCanvasH = viewport.h / 2 - delta; let xDistance = (panDir.x &gt; 0 ? Math.max(0, Math.min(halfCanvasW, box.xHigh - p.x)) / (halfCanvasW) : Math.max(0, Math.min(halfCanvasW, p.x - box.xLow)) / (halfCanvasW)); xDistance = this.smoothstep(xDistance, 0, 0.75); let yDistance = (panDir.y &gt; 0 ? Math.max(0, Math.min(halfCanvasH, box.yHigh - p.y)) / (halfCanvasH) : Math.max(0, Math.min(halfCanvasH, p.y - box.yLow)) / (halfCanvasH)); yDistance = this.smoothstep(yDistance, 0, 0.75); // Use d/2+05, because when d = 0.5 camera movement = lens movement // with the effect of the lens not moving from its canvas position. const txy = {x:xDistance / 2 + 0.5, y: yDistance / 2 + 0.5}; return txy; } /** * @ignore */ static getCanvasBorder(focus, context) { // Return the min distance in canvas pixel of the lens center from the boundary. const radiusFactorFromBoundary = 1.5; return context.z * focus.radius * radiusFactorFromBoundary; // Distance Lens Center Canvas Border } /** * @ignore */ static getShrinkedBox(viewport, delta) { // Return the viewport box in canvas pixels, shrinked of delta pixels on the min,max corners const box = { xLow:delta, yLow:delta, xHigh:viewport.w - delta, yHigh:viewport.h - delta }; return box; } /** * @ignore */ static getRadiusRangeCanvas(viewport) { // Returns the acceptable lens radius range in pixel for a certain viewport const maxMinRadiusRatio = 3; const minRadius = Math.min(viewport.w, viewport.h) * 0.1; const maxRadius = minRadius * maxMinRadiusRatio; return {min:minRadius, max:maxRadius}; } /** * @ignore */ static smoothstep(x, x0, x1) { // Return the smoothstep interpolation at x, between x0 and x1. if (x &lt; x0) { return 0; } else if (x &gt; x1) { return 1; } else { const t = (x - x0) / (x1 - x0); return t * t * (-2 * t + 3); } } } export { FocusContext } × Search results Close ISTI - CNR &amp; CRS4 - ViC "},"Layer.js.html":{"id":"Layer.js.html","title":"Source: Layer.js","body":" OpenLIME Classes AnnotationBoundingBoxCacheCameraCanvasControllerController2DControllerPanZoomCoordinateSystemEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerImageLayerLensLayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigator ent Roman coin', * type: 'rti', * url: '../../assets/rti/hsh/info.json', * normals: false * }); * viewer.addLayer('coin1', layer1); */ //FIXME: prefetchborder and mipmapbias should probably go into layout class Layer { /** * Creates a Layer. Additionally, an object literal with Layer `options` can be specified. * Signals are triggered when the layer is ready (i.e. completely initialized) or if its state variables have been updated (a redraw is needed). * @param {Object} [options] * @param {(string|Layout)} options.layout='image' The layout (the format of the input raster images). * @param {string} options.type A string identifier to select the specific derived layer class to instantiate. * @param {string} options.id The layer unique identifier. * @param {string} options.label A string with a more comprehensive definition of the layer. If it exists, it is used in the UI layer menu, otherwise the `id` value is taken. * @param {Transform} options.transform The relative coords from layer to canvas. * @param {bool} options.visible=true Whether to render the layer. * @param {number} options.zindex Stack ordering value for the rendering of layers (higher zindex on top). * @param {bool} options.overlay=false Whether the layer must be rendered in overlay mode. * @param {number} options.prefetchBorder=1 The threshold (in tile units) around the current camera position for which to prefetch tiles. * @param {number} options.mipmapBias=0.4 The mipmap bias of the texture. * @param {Object} options.shaders A map (shadersId, shader) of the shaders usable for the layer rendering. See @link {Shader}. * @param {Controller[]} options.controllers An array of UI device controllers active on the layer. * @param {Layer} options.sourceLayer The layer from which to take the tiles (in order to avoid tile duplication). */ constructor(options) { //create from derived class if type specified if (options.type) { let type = options.type; delete options.type; if (type in this.types) { return this.types[type](options); } throw \"Layer type: \" + type + \" module has not been loaded\"; } this.init(options); /* //create members from options. this.rasters = this.rasters.map((raster) =&gt; new Raster(raster)); //layout needs to be the same for all rasters if(this.rasters.length) { if(typeof(this.layout) != 'object') this.layout = new Layout(this.rasters[0].url, this.layout) this.setLayout(this.layout) if(this.rasters.length) for(let raster in this.rasters) raster.layout = this.layout; } if(this.shader) this.shader = new Shader(this.shader); */ } /** @ignore */ init(options) { Object.assign(this, { transform: new Transform(), viewport: null, debug: false, visible: true, zindex: 0, overlay: false, //in the GUI it won't affect the visibility of the other layers rasters: [], layers: [], controls: {}, controllers: [], shaders: {}, layout: 'image', shader: null, //current shader. gl: null, width: 0, height: 0, prefetchBorder: 1, mipmapBias: 0.4, //signals: { update: [], ready: [], updateSize: [] }, //update callbacks for a redraw, ready once layout is known. //internal stuff, should not be passed as options. tiles: new Map(), //keep references to each texture (and status) indexed by level, x and y. //each tile is tex: [.. one for raster ..], missing: 3 missing tex before tile is ready. //only raster used by the shader will be loade. queue: [], //queue of tiles to be loaded. requested: {}, //tiles requested. }); Object.assign(this, options); if (this.sourceLayer) this.tiles = this.sourceLayer.tiles; //FIXME avoid tiles duplication this.transform = new Transform(this.transform); if (typeof (this.layout) == 'string') { let size = { width: this.width, height: this.height }; this.setLayout(new Layout(null, this.layout, size)); } else { this.setLayout(this.layout); } } setViewport(view) { this.viewport = view; this.emit('update'); } addShaderFilter(f) { if (!this.shader) throw \"Shader not implemented\"; this.shader.addFilter(f); } removeShaderFilter(name) { if (!this.shader)
