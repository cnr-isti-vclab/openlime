asterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback openlime 0.1.1 OpenLIME (Open Layered IMage Explorer) OpenLIME (Open Layered IMage Explorer) is an open-source JavaScript library for the efficient display of scalable high-resolution relightable images. OpenLime is jointly developed by CRS4 Visual and Data-intensive Computing Group and CNR ISTI - Visual Computing Lab. OpenLIME natively supports BRDF and RTI datasets, and can be easily extended for other multi-channel raster datasets, such as hyper spectral imaging or other reflectance modeling. Input data can be combined in a multi-layer visualization system using opacity and blending modes, and interactive lenses. All web image types (jpg, png, gif, etc...) are supported as well as the most common multi-resolution image formats (deepzoom, zoomify, IIIF, google maps), which are suitable for large images. OpenLIME provides a set of ready-to-use layers that allows developers to quickly publish their datasets on the web or make kiosk applications. Ready-to-use layers ranging from images, to multi-channel data (such as, for example, RTI or BRDF) or the combination of multiple layers or for visualization through lenses. The OpenLIME library comes with a responsive user iterface that works well with both desktop monitors and multitouch systems. Additionally, it is designed to be highly configurable, so it will be easy for the experienced developer to build their own custom interface. The library contains a convenient set of examples that can be used both to understand how the library works and as a starting point for programming with OpenLIME itself. Installing npm Ubuntu sudo apt install npm Ubuntu 18.04 You might have some problem using the old npm version shipped with Ubuntu18.04, and even upgrading it. This worked for me: sudo npm install -g npm@latest-6 Windows To obtain npm for Windows, you need to download the Windows version of node.js from https://nodejs.org/en/download/ . You can download either the Windows Installer (.msi) or the Windows Binary (.zip). If you download and expand the Windows Binary zip file, you will afterwards need to set your PATH variable to include the directory that contains the npm executable (this directory is the subdirectory node_modules\\npm\\bin). Setting up npm (all platforms) The following step should be performed in the openlime directory that was cloned from this repository. Before using npm, you need to install the required packages locally. This only needs to be done once. The following command tells npm to download all the webpack packages (and their dependencies) listed in the package.json file. These will be put in the ./node_modules directory. npm install The downloaded packages include rollup, documentation, and nodemon, which will be used below. Using npm (all platforms) These steps should be performed in the openlime directory that was cloned from this repository. Build the code The following command reads the javascript code in ./src, and puts the transpiled webpack code in ./dist/main.js. npm run build The webpack code is used, for example, by the ./dist/index.html web page. Run the node.js server If you wish, you can run the node.js development server to serve your web pages. This server will use ./dist as the home directory. The server is run in \"hot\" mode, which means that whenever you change a file in the ./src directory, the webpack code will automatically be rebuilt, and your web browser will automatically refresh, to reflect your latest changes. npm run start Then access the demo app at http://localhost:8080 (which by default is ./dist/index.html). If you prefer to serve from a different port, say 8088, you can call npm run start -- --port 8088 Create a rollup file to use with other servers You do not need to use node.js as the server. Instead, you can use the &lt;script&gt; approach, embedding a rollup file, either ./build/openlime.min.js or ./build/openlime.js, in your web page. The files ./dist/ui_custom.html and ./dist/ui_svg.html are examples of this approach. Such files will display correctly when served from any web server. To create the rollup files, call rollup: npm run rollup Keep the rollup files up to date If you keep a nodemon (node monitor) script running, it will automatically update the rollup files ./build/openlime.min.js and ./build/openlime.js whenever anything changes in the ./src directory. Note that, unlike with the node.js server, the browser will not refresh automatically; you will have to do that yourself once the rollup files have been updated. npm run nodemon Create documentation The documentation is created from structured comments in the source code (in ./src). Once created, it is accessible from ./docs/index.html npm run doc Customization skin.css skin.svg Run svgo -p 1 skin.svg -o skin.min.svg to minimize svg. Documentation.js supports markdown syntax and JSDoc syntax. JSON example of the configuration: { camera: { }, canvas: { rasters: [ { id: name: width: //optional height: //optional url: layout: &lt;image|google|deepzoom|zoomify|iip|iiif&gt; //optional if can be determined from the url. } ] }, overlay: { } } × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"global.html#Annotation":{"id":"global.html#Annotation","title":"Class: Annotation","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: Annotation Annotation Represents an annotation that can be drawn as an overlay on a canvas. An annotation is a decoration (text, graphics element, glyph) that provides additional information for interpreting underlying drawings. Each annotation has a unique identifier and can contain various properties such as description, category, drawing style, labels, etc. new Annotation( [options]) Creates a new Annotation instance. Parameters: Name Type Argument Description options Object &lt;optional&gt; Configuration options for the annotation. Properties Name Type Argument Default Description id string &lt;optional&gt; Unique identifier for the annotation. If not provided, a UUID will be generated. code string &lt;optional&gt; A code identifier for the annotation. label string &lt;optional&gt; '' Display label for the annotation. description string &lt;optional&gt; HTML text containing a comprehensive description. class string &lt;optional&gt; Category or classification of the annotation. target string &lt;optional&gt; Target element or area this annotation refers to. svg string &lt;optional&gt; SVG content for the annotation. image Object &lt;optional&gt; Image data associated with the annotation. region Object &lt;optional&gt; Region coordinates {x, y, w, h} for the annotation. data Object &lt;optional&gt; {} Additional custom data for the annotation. style Object &lt;optional&gt; Style configuration for rendering. bbox BoundingBox &lt;optional&gt; Bounding box of the annotation. visible boolean &lt;optional&gt; true Visibility state of the annotation. state Object &lt;optional&gt; State variables for the annotation. ready boolean &lt;optional&gt; false Indicates if SVG conversion is complete. needsUpdate boolean &lt;optional&gt; true Indicates if annotation needs updating. editing boolean &lt;optional&gt; false Indicates if annotation is being edited. Methods &lt;static&gt; fromJsonLd(entry) Creates an Annotation instance from a JSON-LD format string. Parameters: Name Type Description entry Object The JSON-LD object representing an annotation. Throws: If the entry is not a valid JSON-LD annotation or contains unsupported selectors. Type Error Returns: A new Annotation instance. Type Annotation getBBoxFromElements() Calculates and returns the bounding box of the annotation based on its elements or region. The coordinates are always relative to the top-left corner of the canvas. Returns: The calculated bounding box of the annotation. If the annotation has no elements and no region, returns an empty bounding box. If the annotation has a region but no elements, returns a bounding box based on the region. If the annotation has elements, calculates the bounding box that encompasses all elements. Type BoundingBox toJsonLd() Converts the annotation to a JSON-LD format object. Returns: A JSON-LD representation of the annotation including context, id, type, body (with code, class, and description), and target selector information. Type Object × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"AudioPlayer.html":{"id":"AudioPlayer.html","title":"Class: AudioPlayer","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: AudioPlayer AudioPlayer Class representing an audio player with playback control capabilities. Supports playing, pausing, resuming, and stopping audio files with volume control and playback speed adjustment. new AudioPlayer() Creates an instance of AudioPlayer. Initializes the player with default settings and sets up signal handling for the 'ended' event. Methods &lt;async&gt; continue() Resumes playback of a paused audio file. Returns: Resolves when the resumed audio playback completes. Type Promise.&lt;void&gt; getPlayDuration() Returns the total play duration in milliseconds. Returns: Total play duration in milliseconds. Type number pause() Pauses the currently playing audio. Updates play duration when pausing. &lt;async&gt; play(audioFile [, speed]) Plays an audio file with optional playback speed adjustment. If audio is paused, it will resume playback instead of starting a new file. Parameters: Name Type Argument Default Description audioFile string The path or URL to the audio file. speed number &lt;optional&gt; 1.0 Playback speed multiplier (1.0 is normal speed). Returns: Resolves when the audio playback completes. Type Promise.&lt;void&gt; setVolume(volume) Sets the audio volume level. Parameters: Name Type Description volume number Volume level between 0.0 and 1.0. &lt;async&gt; silence(ms) Creates a delay in the execution flow. Parameters: Name Type Description ms number Number of milliseconds to wait. Returns: Resolves after the specified delay. Type Promise.&lt;void&gt; stop() Stops the current audio playback and resets all player states. Removes event listeners and updates final play duration. toggleMute() Toggles the mute state of the audio player. Stores the previous volume level when muting and restores it when unmuting. × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"BoundingBox.html":{"id":"BoundingBox.html","title":"Class: BoundingBox","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: BoundingBox BoundingBox Represents an axis-aligned rectangular bounding box that can be wrapped tightly around geometric elements. The box is defined by two opposite vertices (low and high corners) and provides a comprehensive set of utility methods for manipulating and analyzing bounding boxes. new BoundingBox( [options]) Creates a new BoundingBox instance. Parameters: Name Type Argument Description options Object &lt;optional&gt; Configuration options for the bounding box Properties Name Type Argument Default Description xLow number &lt;optional&gt; 1e20 X coordinate of the lower corner yLow number &lt;optional&gt; 1e20 Y coordinate of the lower corner xHigh number &lt;optional&gt; -1e20 X coordinate of the upper corner yHigh number &lt;optional&gt; -1e20 Y coordinate of the upper corner Methods center() Calculates the center point of the bounding box. Returns: The coordinates of the center point Type Object corner(i) Gets the coordinates of a specific corner of the bounding box. Parameters: Name Type Description i number Corner index (0: bottom-left, 1: bottom-right, 2: top-left, 3: top-right) Returns: The coordinates of the specified corner Type Object fromArray(x) Initializes the bounding box from an array of coordinates. Parameters: Name Type Description x Array.&lt;number&gt; Array containing coordinates in order [xLow, yLow, xHigh, yHigh] height() Calculates the height of the bounding box. Returns: The difference between yHigh and yLow Type number intersects(box) Checks if this bounding box intersects with another bounding box. Parameters: Name Type Description box BoundingBox The other bounding box to check intersection with Returns: True if the boxes intersect, false otherwise Type boolean isEmpty() Checks if the bounding box is empty (has no valid area). A box is considered empty if its low corner coordinates are greater than its high corner coordinates. Returns: True if the box is empty, false otherwise Type boolean mergeBox(box) Enlarges this bounding box to include another bounding box. If this box is empty, it will adopt the dimensions of the input box. If the input box is null, no changes are made. Parameters: Name Type Description box BoundingBox | null The bounding box to merge with this one mergePoint(p) Enlarges this bounding box to include a point. Parameters: Name Type Description p Object The point to include in the bounding box print() Prints the bounding box coordinates to the console in a formatted string. Output format: \"BOX=xLow, yLow, xHigh, yHigh\" with values rounded to 2 decimal places quantize(side) Quantizes the bounding box coordinates by dividing by a specified value and rounding down. This creates a grid-aligned bounding box. Parameters: Name Type Description side number The value to divide coordinates by shift(dx, dy) Moves the bounding box by the specified displacement. Parameters: Name Type Description dx number Displacement along the x-axis dy number Displacement along the y-axis toArray() Converts the bounding box coordinates to an array. Returns: Array of coordinates in order [xLow, yLow, xHigh, yHigh] Type Array.&lt;number&gt; toEmpty() Resets the bounding box to an empty state by setting coordinates to extreme values. toString() Creates a space-separated string representation of the bounding box coordinates. Returns: String in format \"xLow yLow xHigh yHigh\" Type string width() Calculates the width of the bounding box. Returns: The difference between xHigh and xLow Type number × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"Cache.html":{"id":"Cache.html","title":"Namespace: Cache","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLens ment Description options Object &lt;optional&gt; Configuration options Properties Name Type Argument Default Description bounded boolean &lt;optional&gt; true Whether to limit camera translation to scene boundaries maxFixedZoom number &lt;optional&gt; 2 Maximum allowed pixel size minScreenFraction number &lt;optional&gt; 1 Minimum portion of screen to show when zoomed in target Transform &lt;optional&gt; Initial target transform Fires: Camera#event:update Methods copy() Creates a deep copy of the camera instance. Returns: A new Camera instance with copied properties Type Camera deltaZoom(dt, dz [, x] [, y]) Applies a relative zoom change at a specific point. Parameters: Name Type Argument Default Description dt number Animation duration in milliseconds dz number Relative zoom change factor x number &lt;optional&gt; 0 X coordinate to zoom around y number &lt;optional&gt; 0 Y coordinate to zoom around fit(box [, dt]) Adjusts the camera to frame a specified bounding box. Parameters: Name Type Argument Default Description box BoundingBox The box to frame in canvas coordinates dt number &lt;optional&gt; 0 Animation duration in milliseconds fitCameraBox(dt) Resets the camera to show the entire scene. Parameters: Name Type Description dt number Animation duration in milliseconds getCurrentTransform(time) Gets the camera transform at a specific time. Parameters: Name Type Description time number Current time in milliseconds (from performance.now()) Returns: The interpolated transform at the specified time Type Transform getGlCurrentTransform(time) Gets the camera transform at a specific time in device coordinates. Parameters: Name Type Description time number Current time in milliseconds (from performance.now()) Returns: The interpolated transform scaled for device pixels Type Transform glViewport() Returns the current viewport in device coordinates (accounting for device pixel ratio). Returns: The current viewport scaled for device pixels Type Viewport mapToScene(x, y, transform) Converts canvas coordinates to scene coordinates using the specified transform. Parameters: Name Type Description x number X coordinate relative to canvas y number Y coordinate relative to canvas transform Transform Transform to use for conversion Returns: Coordinates in scene space relative to viewport center Type Object pan(dt, dx, dy) Pans the camera by a specified amount in canvas coordinates. Parameters: Name Type Description dt number Animation duration in milliseconds dx number Horizontal displacement dy number Vertical displacement rotate(dt, a) Rotates the camera around its z-axis. Parameters: Name Type Description dt number Animation duration in milliseconds a number Rotation angle in degrees sceneToCanvas(x, y, transform) Converts scene coordinates to canvas coordinates using the specified transform. Parameters: Name Type Description x number X coordinate in scene space y number Y coordinate in scene space transform Transform Transform to use for conversion Returns: Coordinates in canvas space Type Object setPosition(dt, x, y, z, a [, easing]) Sets the camera target parameters for a new position. Parameters: Name Type Argument Description dt number Animation duration in milliseconds x number X component of translation y number Y component of translation z number Zoom factor a number Rotation angle in degrees easing string &lt;optional&gt; Easing function name for animation Fires: Camera#event:update setViewport(view) Updates the viewport while maintaining the camera position as close as possible to the previous one. Parameters: Name Type Description view Viewport The new viewport in CSS coordinates zoom(dt, z [, x] [, y]) Zooms the camera to a specific point in canvas coordinates. Parameters: Name Type Argument Default Description dt number Animation duration in milliseconds z number Target zoom level x number &lt;optional&gt; 0 X coordinate to zoom towards y number &lt;optional&gt; 0 Y coordinate to zoom towards Events update The event is fired when the camera target is changed. update The event is fired when a uniform shader variable is changed. × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"Canvas.html":{"id":"Canvas.html","title":"Class: Canvas","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: Canvas Canvas Canvas class that manages WebGL context, layers, and scene rendering. Handles layer management, WebGL context creation/restoration, and render timing. new Canvas(canvas, overlay, camera [, options]) Creates a  started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: Controller Controller Base class that handles user interaction via device events (mouse/touch events). Provides an abstract user interface to define interaction actions such as panning, pinching, tapping, etc... The actions are implemented by pre-defined callback functions: panStart(e) intercepts the initial pan event (movement of the mouse after pressing a mouse button or moving a finger). The event is captured calling e.preventDefault(). panMove(e) receives and handles the pan event. panEnd(e) intercepts the final pan event (the user releases the left mouse button or removes his finger from the screen). pinchStart(e1, e2) intercepts the initial pinch event (a continuous gesture that tracks the positions between the first two fingers that touch the screen). The event is captured calling e1.preventDefault(). pinchMove(e1,e2) receives and handles the pinch event. pinchEnd(e1,e2) intercepts the final pinch event (the user removes one of their two fingers from the screen). mouseWheel(e) receives and handles the mouse wheel event (the user rotates the mouse wheel button). fingerSingleTap(e) receives and handles the single-tap event (the user presses a mouse button quickly or touches the screen shortly with a finger). fingerDoubleTap(e) receives and handles the double-tap event (the user quickly presses a mouse button twice or shortly touches the screen with a finger twice). e.preventDefault() will capture the event and wont be propagated to other controllers. This class only describes user interactions by implementing actions or callbacks. A Controller works in concert with a PointerManager object that emits events and links them to actions. &lt;abstract&gt; new Controller( [options]) Creates a new Controller instance. Parameters: Name Type Argument Description options Object &lt;optional&gt; Configuration options Properties Name Type Argument Default Description active boolean &lt;optional&gt; true Whether the controller is initially active debug boolean &lt;optional&gt; false Enable debug logging panDelay number &lt;optional&gt; 50 Inertial value for panning movements in milliseconds zoomDelay number &lt;optional&gt; 200 Delay for smoothing zoom events in milliseconds priority number &lt;optional&gt; 0 Controllers with higher priority are invoked first activeModifiers Array.&lt;number&gt; &lt;optional&gt; [0] Array of modifier states that activate this controller Example // Create a pan-zoom controller and associate it with the viewer's pointer manager const panzoom = new OpenLIME.ControllerPanZoom(viewer.camera, { priority: -1000, activeModifiers: [0, 1] }); viewer.pointerManager.onEvent(panzoom); Methods &lt;abstract&gt; fingerDoubleTap(e) Called for quick double mouse press or double finger touch. Parameters: Name Type Description e Event The double tap event &lt;abstract&gt; fingerSingleTap(e) Called for quick mouse press or short finger touch. Parameters: Name Type Description e Event The tap event modifierState(e) Gets the modifier state from an event. Parameters: Name Type Description e Event The event to check Returns: Modifier state bitmask where: 0 = No modifiers 1 = Ctrl key 2 = Shift key 4 = Alt key Multiple modifiers combine their values (e.g., Ctrl+Shift = 3) Type number &lt;abstract&gt; mouseWheel(e) Called when user rotates mouse wheel. Parameters: Name Type Description e WheelEvent The wheel event &lt;abstract&gt; panEnd(e) Called when panning ends (mouse up or finger lift). Parameters: Name Type Description e Event The pan end event &lt;abstract&gt; panMove(e) Called continuously during panning. Parameters: Name Type Description e Event The pan move event &lt;abstract&gt; panStart(e) Called when user starts panning (mouse down or finger touch). Call e.preventDefault() to capture the event. Parameters: Name Type Description e Event The pan start event &lt;abstract&gt; pinchEnd(e1, e2) Called when pinch ends (finger lift). Pa out#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: Controller2D Controller2D Controller for handling 2D position updates based on pan and tap events. Extends the base Controller to track a 2D position (x, y) of the device pointer. Supports two coordinate systems: Absolute: Coordinates mapped to [-1, 1] with origin at bottom-left of canvas Relative: Coordinates based on distance from initial pan position, scaled by speed new Controller2D(callback [, options]) Creates a new Controller2D instance. Parameters: Name Type Argument Description callback updatePosition Function called when position is updated options Object &lt;optional&gt; Configuration options Properties Name Type Argument Default Description relative boolean &lt;optional&gt; false Whether to use relative coordinate system speed number &lt;optional&gt; 2.0 Scaling factor for relative coordinates box BoundingBox &lt;optional&gt; Bounding box for coordinate constraints onPanStart updatePosition &lt;optional&gt; Callback for pan start event onPanEnd updatePosition &lt;optional&gt; Callback for pan end event active boolean &lt;optional&gt; true Whether the controller is active activeModifiers Array.&lt;number&gt; &lt;optional&gt; [0] Array of active modifier states Extends Controller Methods &lt;abstract&gt; fingerDoubleTap(e) Called for quick double mouse press or double finger touch. Parameters: Name Type Description e Event The double tap event Inherited From: Controller#fingerDoubleTap Overrides: Controller#fingerDoubleTap fingerSingleTap(e) Handles single tap/click events. Only processes events in absolute coordinate mode. Parameters: Name Type Description e MouseEvent | TouchEvent Tap event Inherited From: Controller2D#fingerSingleTap Overrides: Controller#fingerSingleTap modifierState(e) Gets the modifier state from an event. Parameters: Name Type Description e Event The event to check Inherite nal&gt; Configuration options Properties Name Type Argument Default Description zoomAmount number &lt;optional&gt; 1.2 The zoom multiplier for wheel/double-tap events controlZoom boolean &lt;optional&gt; false If true, requires Ctrl key to be pressed for zoom operations useGLcoords boolean &lt;optional&gt; false If true, uses WebGL coordinate system instead of HTML panDelay number &lt;optional&gt; Delay for pan animations zoomDelay number &lt;optional&gt; Delay for zoom animations Fires: ControllerPanZoom#event:nowheel - Emitted when a wheel event is received but ctrl key is required and not pressed Extends Controller Methods &lt;abstract&gt; fingerSingleTap(e) Called for quick mouse press or short finger touch. Parameters: Name Type Description e Event The tap event Inherited From: Controller#fingerSingleTap Overrides: Controller#fingerSingleTap modifierState(e) Gets the modifier state from an event. Parameters: Name Type Description e Event The event to check Inherited From: Controller#modifierState Overrides: Controller#modifierState Returns: Modifier state bitmask where: 0 = No modifiers 1 = Ctrl key 2 = Shift key 4 = Alt key Multiple modifiers combine their values (e.g., Ctrl+Shift = 3) Type number × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"CoordinateSystem.html":{"id":"CoordinateSystem.html","title":"Class: CoordinateSystem","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: CoordinateSystem CoordinateSystem Contain functions to pass between different coordinate system. Here described the coordinate system in sequence CanvasHTML: Html coordinates: 0,0 left,top to width height at bottom right (y Down) CanvasContext: Same as Html, but scaled by devicePixelRatio (y Down) (required for WebGL, not for SVG) Viewport: 0,0 left,bottom to (width,height) at top right (y Up) Center: 0,0 at viewport center (y Up) Scene: 0,0 at dataset center (y Up). The dataset is placed here through the camera transform Layer: 0,0 at Layer center (y Up). Layer is placed over the dataset by the layer transform Image: 0,0 at left,top (y Down) Layout: 0,0 at left,top (y Down). Depends on layout new CoordinateSystem() Methods &lt;static&gt; fromCanvasHtmlToImage(p, camera, layerT, layerSize, applyGLScale) Transform a point from CanvasHtml to Image Parameters: Name Type Description p * point {x, y} in CanvasHtml (0,0 left,top, y Down) camera Camera camera layerT Transform layer transform layerSize * {w, h} Size in pixel of the Layer applyGLScale bool if true apply devPixelRatio scale. Keep it false when working with SVG Returns: Point in Image space (0,0 left,top of the image, y Down) &lt;static&gt; fromCanvasHtmlToScene(p, camera, useGL) Transform a point from CanvasHtml to Scene Parameters: Name Type Description p * point {x, y} in CanvasHtml (0,0 left,top, y Down) camera Camera camera useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: Point in Scene coordinates (0,0 at scene center, y Up) &lt;static&gt; fromCanvasHtmlToViewport(p, camera, useGL) Transform point from CanvasHTML to GLViewport Parameters: Name Type Description p * point in CanvasHtml: 0,0 left,top y Down camera Camera Camera useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: point in GLViewport: 0,0 left,bottom, scaled by devicePixelRatio &lt;static&gt; fromLayerBoxToSceneBox(box, layerT) Transform a box from Layer to Scene Parameters: Name Type Description box BoundingBox box in Layer coordinates (0,0 at layer center) layerT Transform layer transform Returns: box in Scene coordinates (0,0 at scene center) &lt;static&gt; fromLayerBoxToViewportBox(box, camera, layerT, useGL) Transform a box from Layer to Viewport coordinates Parameters: Name Type Description box BoundingBox box in Layer coordinates (0,0 at Layer center y Up) camera Camera layerT Transform layer transform useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: Box in Viewport coordinates (0,0 at left, bottom y Up) &lt;static&gt; fromLayerToCenter(p, camera, layerT) Transform a point from Layer to Center Parameters: Name Type Description p * point {x,y} in Layer coordinates (0,0 at Layer center) camera Camera camera layerT Transform layer transform Returns: point in Center (0, 0 at glViewport center) coordinates. &lt;static&gt; fromLayerToImage(p, layerSize) Transform a point from Layer to Image coordinates Parameters: Name Type Description p * point {x, y} Layer coordinates (0,0 at Layer center) layerSize * {w, h} Size in pixel of the Layer Returns: Point in Image coordinates (0,0 at left,top, y Down) &lt;static&gt; fromLayerToViewport(p, camera, layerT, useGL) Transform a point from Layer to Viewport coordinates Parameters: Name Type Description p * point {x,y} Layer (0,0 at Layer center y Up) camera Camera layerT Transform layer transform useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: point in viewport coordinates (0,0 at left,bottom y Up) &lt;static&gt; fromSceneBoxToLayerBox(box, layerT) Transform a box from Scene to Layer Parameters: Name Type Description box BoundingBox box in Layer coordinates (0,0 at layer center) layerT Transform layer transform Returns: box in Scene coordinates (0,0 at scene center) &lt;static&gt; fromSceneToCanvasHtml(p, camera, useGL) Transform a point from Scene to CanvasHtml Parameters: Name Type Description p * point {x, y} Scene coordinates (0,0 at scene center, y Up) camera Camera camera useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: Point in CanvasHtml (0,0 left,top, y Down) &lt;static&gt; fromSceneToViewport(p, camera, useGL) Transform a point from Scene to Viewport Parameters: Name Type Description p * point {x, y} Scene coordinates (0,0 at scene center, y Up) camera Camera camera useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: Point in Viewport (0,0 left,bottom, y Up) &lt;static&gt; fromSceneToViewportNoCamera(p, cameraT, viewport) Transform a point from Scene to Viewport, using given transform and viewport Parameters: Name Type Description p * point {x, y} Scene coordinates (0,0 at scene center, y Up) cameraT Transform camera transform viewport * viewport {x,y,dx,dy,w,h} Returns: Point in Viewport (0,0 left,bottom, y Up) &lt;static&gt; fromViewportBoxToImageBox(box, cameraT, viewport, layerT, layerSize) Transform a box from ansform and viewport Parameters: Name Type Description p * point {x, y} Viewport coordinates (0,0 at left,bottom, y Up) cameraT Transform camera transform viewport * viewport {x,y,dx,dy,w,h} Returns: Point in Viewport (0,0 at scene center, y Up) &lt;static&gt; getFromLayerToViewportTransform(camera, layerT, useGL) Get a transform to go from Layer (0,0 at Layer center y Up) to Viewport (0,0 at left,bottom y Up) Parameters: Name Type Description camera Camera layerT Transform layer transform useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: transform from Layer to Viewport &lt;static&gt; getFromLayerToViewportTransformNoCamera(CameraT, viewport, layerT) Get a transform to go from Layer (0,0 at Layer center y Up) to Viewport (0,0 at left,bottom y Up) Parameters: Name Type Description CameraT Transform camera transform viewport viewport {x,y,dx,dy,w,h} viewport layerT Transform layer transform Returns: transform from Layer to Viewport &lt;static&gt; getFromViewportToCenterTransform(camera, useGL) Get a transform to go from viewport 0,0 at left, bottom y Up, to Center 0,0 at viewport center Parameters: Name Type Description camera Camera camera useGL bool True to work with WebGL, false for SVG. When true, it uses devPixelRatio scale Returns: transform from Viewport to Center &lt;static&gt; getFromViewportToCenterTransformNoCamera(viewport) Get a transform to go from viewport 0,0 at left, bottom y Up, to Center 0,0 at viewport center from explicit viewport param. (Not using camera parameter here) Parameters: Name Type Description viewport * viewport Returns: transform from Viewport to Center &lt;static&gt; getViewport(useGL) Return the camera viewport: scaled by devicePixelRatio if useGL is true. Parameters: Name Type Description useGL bool True to work with WebGL, false for SVG. When true viewport scaled by devPixelRatio Returns: Viewport &lt;static&gt; invertY(p, viewport) Invert y with respect to viewport.h Parameters: N vent:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: Draggable Draggable The Draggable class enables an element to be dragged and moved around within its parent element. It creates a draggable container with a handle that can be used to initiate the dragging action. The draggable element is positioned absolutely within its parent container and can be customized through various options. The class requires either a top or bottom position and either a left or right position to be specified through the options parameter. These determine the initial position of the draggable element within its parent container. The default positioning is bottom=20 and right=20. Features: Flexible positioning using top/bottom and left/right coordinates Customizable handle size and appearance Automatic position updates on window resize Touch-enabled dragging support Configurable spacing between handle and content new Draggable(element, parent [, options]) Creates a new Draggable instance. Parameters: Name Type Argument Description element HTMLElement The element to be made draggable parent HTMLElement | string The parent element where the draggable container will be appended. Can be either an HTMLElement or a CSS selector string options Object &lt;optional&gt; Configuration options for the draggable element Properties Name Type Argument Default Description top number &lt;optional&gt; The initial top position in pixels. Mutually exclusive with bottom bottom number &lt;optional&gt; 20 The initial bottom position in pixels. Mutually exclusive with top left number &lt;optional&gt; The initial left position in pixels. Mutually exclusive with right right number &lt;optional&gt; 20 The initial right position in pixels. Mutually exclusive with left handleSize number &lt;optional&gt; 10 The size of the drag handle in pixels handleGap number &lt;optional&gt; 5 The gap between the handle and the draggable content in pixels zindex number &lt;optional&gt; 200 The z-index of the draggable container handleColor string &lt;optional&gt; '#f0f0f0b3' The background color of the handle (supports rgba) Methods appendChild(element) Appends an HTML element to the draggable container and updates its position. Parameters: Name Type Description element HTMLElement The element to append to the draggable container × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"EditorSvgAnnotation.html":{"id":"EditorSvgAnnotation.html","title":"Class: EditorSvgAnnotation","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: EditorSvgAnnotation EditorSvgAnnotation EditorSvgAnnotation enables creation and editing of SVG annotations in OpenLIME. It provides tools for drawing various shapes and managing annotations through a user interface. Features: Drawing tools: point, pin, line, box, circle Annotation editing and management Custom state and data storage Integration with annotation databases through callbacks Undo/redo functionality SVG export capabilities new EditorSvgAnnotation(viewer, layer [, options]) Creates an EditorSvgAnnotation instance Parameters: Name Type Argument Description viewer Viewer The OpenLIME viewer instance layer LayerSvgAnnotation The annotation layer to edit options Object &lt;optional&gt; Configuration options Properties Name Type Argument Default Description classes Object.&lt;string, {stroke: string, label: string}&gt; Annotation classes with colors and labels createCallback crudCallback &lt;optional&gt; Called when creating annotations updateCallback crudCallback &lt;optional&gt; Called when updating annotations deleteCallback crudCallback &lt;optional&gt; Called when deleting annotations enableState boolean &lt;optional&gt; false Whether to save viewer state with annotations customState customStateCallback &lt;optional&gt; Customize saved state data customData customDataCallback &lt;optional&gt; Customize annotation data selectedCallback selectedCallback &lt;optional&gt; Called when annotation is selected tools Object &lt;optional&gt; Custom tool configurations priority number &lt;optional&gt; 20000 Event handling priority Example ```javascript // Create annotation layer const anno = new OpenLIME.Layer(options); viewer.addLayer('annotations', anno); // Initialize editor const editor = new OpenLIME.EditorSvgAnnotation(viewer, anno, { classes: { 'default': { stroke: '#000', label: 'Default' }, 'highlight': { stroke: '#ff0', label: 'Highlight' } } }); // Setup callbacks editor.createCallback = (anno) =&gt; { console.log(\"Created:\", anno); return saveToDatabase(anno); }; ``` Methods createAnnotation() Creates a new annotation Returns: Type void deleteSelected() Deletes the selected annotation Returns: Type void exportAnnotations() Exports all annotations as SVG Returns: Type void redo() Performs a redo operation Returns: Type void undo() Performs an undo operation Returns: Type void × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"FocusContext.html":{"id":"FocusContext.html","title":"Class: FocusContext","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: FocusContext FocusContext FocusContext manages the focus+context visualization technique for lens-based interaction. It handles the distribution of user interactions between lens movement (focus) and camera movement (context) to maintain optimal viewing conditions. Key responsibilities: Maintains proper spacing between lens and viewport boundaries Distributes pan and zoom operations between lens and camera Ensures lens stays within valid viewport bounds Adapts camera transform to accommodate lens position Manages lens radius constraints new FocusContext() Methods &lt;static&gt; adaptContext(viewport, focus, context, desiredScale) Adjusts the camera transform to ensure focus+context conditions are met for a given lens Parameters: Name Type Description viewport Viewport The current viewport focus Focus The lens object context Transform The camera transform to be updated desiredScale number Target scale for the camera transform &lt;static&gt; pan(viewport, focus, context, delta, imageSize) Distributes a pan operation between lens movement and camera transform to maintain focus+context Parameters: Name Type Description viewport Viewport The current viewport focus Focus The lens object to be updated context Transform The camera transform to be updated delta Object Pan amount in dataset pixels Properties Name Type Description x number Horizontal pan amount y number Vertical pan amount imageSize Object Dataset dimensions Properties Name Type Description w number Dataset width h number Dataset height &lt;static&gt; scale(camera, focus, context, dz) Distributes a scale operation between lens radius and camera zoom to maintain focus+context Parameters: Name Type Description camera Camera The camera object containing viewport and zoom constraints focus Focus The lens object to be updated ffects Automatic tile prefetching and caching Coordinate system transformations Animation and interpolation of shader parameters Support for multiple visualization modes Integration with layout systems for different data formats Layers can be used directly or serve as a base class for specialized layer types. The class uses a registration system where derived classes register themselves, allowing instantiation through the 'type' option. new Layer( [options]) Creates a Layer. Additionally, an object literal with Layer options can be specified. Signals are triggered when: ready: the size and layout of the layer is known update: some new tile is available, or some visualization parameters has changed loaded: is fired when all the images needed have been downloaded Parameters: Name Type Argument Description options Object &lt;optional&gt; Properties Name Type Default Description layout string | Layout 'image' The layout (the format of the input raster images). type string A string identifier to select the specific derived layer class to instantiate. id string The layer unique identifier. label string A string with a more comprehensive definition of the layer. If it exists, it is used in the UI layer menu, otherwise the id value is taken. transform Transform The relative coords from layer to canvas. visible bool true Whether to render the layer. zindex number Stack ordering value for the rendering of layers (higher zindex on top). overlay bool false Whether the layer must be rendered in overlay mode. prefetchBorder number 1 The threshold (in tile units) around the current camera position for which to prefetch tiles. mipmapBias number 0.2 Determine which texture is used when scale is not a power of 2. 0: use always the highest resulution, 1 the lowest, 0.5 switch halfway. shaders Object A map (shadersId, shader) of the shaders usable for the layer rendering. See @link {Shader}. controllers Array.&lt;Controller&gt; An array of UI device controllers active on the layer. sourceLayer Layer The layer from which to take the tiles (in order to avoid tile duplication). Fires: Layer#event:ready - Fired when layer is initialized Layer#event:update - Fired when redraw is needed Layer#event:loaded - Fired when all tiles are loaded Layer#event:updateSize - Fired when layer size changes Example ```javascript // Create a basic image layer const layer = new OpenLIME.Layer({ layout: 'deepzoom', type: 'image', url: 'path/to/image.dzi', label: 'Main Image' }); // Add to viewer viewer.addLayer('main', layer); // Listen for events layer.addEvent('ready', () =&gt; { console.log('Layer initialized'); }); ``` Methods &lt;static&gt; computeLayersBBox(layers, discardHidden) Computes combined bounding box of multiple layers Parameters: Name Type Description layers Object.&lt;string, Layer&gt; Map of layers discardHidden boolean Whether to ignore hidden layers Returns: Combined bounding box Type BoundingBox &lt;static&gt; computeLayersMinScale(layers, discardHidden) Computes minimum scale across layers Parameters: Name Type Description layers Object.&lt;string, Layer&gt; Map of layers discardHidden boolean Whether to ignore hidden layers Returns: Minimum scale value Type number addControl(name, value) Adds a shader parameter control Parameters: Name Type Description name string Control identifier value * Initial value Throws: If control already exists Type Error addShaderFilter(filter) Adds a filter to the current shader Parameters: Name Type Description filter Object Filter specification Throws: If no shader is set Type Error boundingBox() Gets layer bounding box in scene coordinates Returns: Bounding box Type BoundingBox clearShaderFilters(name) Removes all filters from the current shader Parameters: Name Type Description name Object Filter name Throws: If no shader is set Type Error getControl(name) Gets the shader parameter control corresponding to name Parameters: Name Type Description name * The name of the control. return {*} The control getMode() Gets the current shader visualization mode Returns: Current mode or null if no shader Type string | null getModes() Gets available shader modes Returns: Array of available modes Type Array.&lt;string&gt; getState( [stateMask]) Gets the current layer state Parameters: Name Type Argument Default Description stateMask Object &lt;optional&gt; null Optional mask to filter returned state properties Returns: Current state object Type Object interpolateControls() Updates control interpolation Returns: Whether all interpolations are complete Type boolean pixelSizePerMM() Gets pixel size in millimeters Returns: Size of one pixel in mm Type number removeShaderFilter(name) Removes a filter from the current shader Parameters: Name Type Description name Object Filter name Throws: If no shader is set Type Error scale() Gets layer scale Returns: Current scale value Type number setControl(name, value [, dt] [, easing]) Sets a shader control value with optional animation Parameters: Name Type Argument Default Description name string Control identifier value * New value dt number &lt;optional&gt; Animation duration in ms easing string &lt;optional&gt; 'linear' Easing function Fires: Layer#event:update setMode(mode) Sets shader visualization mode Parameters: Name Type Description mode string Mode to set Fires: Layer#event:update setShader(id) Sets the active shader Parameters: Name Type Description id string Shader identifier from registered shaders Fires: Layer#event:update Throws: If shader ID is not found Type Error setState(state [, dt] [, easing]) Sets the layer state with optional animation Parameters: Name Type Argument Default Description state Object State object with controls and mode dt number &lt;optional&gt; Animation duration in ms easing string &lt;optional&gt; 'linear' Easing function ('linear'|'ease-out'|'ease-in-out') setTransform(tx) Sets the layer's transform Parameters: Name Type Description tx Transform New transform Fires: Layer#event:updateSize setViewport(view) Sets ct Type Definitions Type The type of the image. All web single-resolution image types (jpg, png, gif, etc...) are supported as well as the most common multi-resolution image formats (deepzoom, zoomify, IIIF, google maps). Type: 'image' | 'deepzoom' | 'deepzoom1px' | 'google' | 'zoomify' | 'iiif' | 'tarzoom' | 'itarzoom' Events ready The event is fired when a layout is ready to be drawn(the single-resolution image is downloaded or the multi-resolution structure has been initialized). ready The event is fired when a layout is ready to be drawn(the single-resolution image is downloaded or the multi-resolution structure has been initialized). updateSize The event is fired when a layout size is modified (and the scene extension must be recomputed at canvas level). × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"LayoutTiles.html":{"id":"LayoutTiles.html","title":"Class: LayoutTiles","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: LayoutTiles LayoutTiles The Layout class is responsible for specifying the data formats (images) managed by OpenLIME. All web single-resolution image types (jpg, png, gif, etc...) are supported as well as the most common tiled image formats (deepzoom, zoomify, IIIF, google maps), which are suitable for large images. Single-resolution images The URL is the address of the file (for instance, 'https://my.example/image.jpg'). Tiled images They can be specified in a variety of ways depending on the format chosen. deepzoom - The root tile of the image pyramid has a size &gt; 1px (typical value is 254px). It is defined by the URL of the .dzi file (for instance, 'https://my.example/image.dzi'). See: DeepZoom deepzoom1px - The root tile of the image pyramid has a size = 1px. It is defined by the URL of the .dzi file (for instance, 'https://my.example/image.dzi'). See: DeepZoom google - The URL points directly to the directory containing the pyramid of images (for instance, 'https://my.example/image'). The standard does not require any configuration file, so it is mandatory to indicate in the options the width and height in pixels of the original image. See: Google Maps zoomify - The URL indicates the location of Zoomify configuration file (for instance, 'https://my.example/image/ImageProperties.xml'). See: Zoomify iip - The server parameter (optional) indicates the URL of the IIPImage endpoint (for example '/fcgi-bin/iipsrv.fcgi'). The URL parameter indicates either just the name of the path and image file (for instance 'image.tif') if the server parameter has been set or the full IIP URL if not (for instance '/fcgi-bin/iipsrv.fcgi?FIF=image.tif' or 'https://you.server//fcgi-bin/iipsrv.fcgi?FIF=image.tif' if image is hosted elsewhere) See: IIPImage Server iiif - According to the standard, the URL is the address of a IIIF server (for instance, 'https://myiiifserver.example/'). See: IIIF tarzoom and itarzoom - This is a custom format of the OpenLIME framework. It can be described as the TAR of a DeepZoom (all the DeepZoom image pyramid is stored in a single file). It takes advantage of the fact that current web servers are able to handle partial-content HTTP requests. Tarzoom facilitates the work of the server, which is not penalised by having to manage a file system with many small files. The URL is the address of the .tzi file (for instance, 'https://my.example/image.tzi'). Warning: tarzoom|itarzoom may not work on older web servers. new LayoutTiles(url, type [, options]) Creates a Layout, a container for a raster image. A layout is defined by a url of the image and a type. Additionally, an object literal with Layout options can be specified. Signals are triggered when the layout is ready to be drawn or its size is modified. Parameters: Name Type Argument Description url string URL of the image. type Layout#Type The type of the image. options Object &lt;optional&gt; An object literal describing the layout content. Properties Name Type Default Description width number The total width of the original, unsplit image. This parameter must only be specified for the 'google' layout type. height number The total height of the original, unsplit image. This parameter must only be specified for the 'google' layout type. suffix string 'jpg' The filename suffix of the tiles. subdomains string 'abc' The ('a'|'b'|'c') s subdomain of a Google template URL (for instance: 'https:{s}.my.example//{z}/{x}/{y}.png'). cachelevels number Number of levels above the current level which will be loaded. Lowering will reduce number of http requests, but image will have tile missing while loading. Methods available() returns the list of tiles available for a rendering getTileURL(id, tile) Gets the URL of a specific tile. The function must be implemented for each layout type supported by OpenLIME. Parameters: Name Type Description id number The channel id. tile Tile The tile. needed() returns the list of tiles required for a rendering, sorted by priority, max neededBox(viewport, transform, layerTransform, border, bias) Computes the tiles needed for each level, given a viewport and a transform. Parameters: Name Type Description viewport Viewport The viewport. transform Transform The current transform. layerTransform Transform The transform of the calling layer border number The threshold (in tile units) around the current camera position for which to prefetch tiles. bias number Determine which texture is used when scale is not a power of 2. 0: use always the highest resulution, 1 the lowest, 0.5 switch halfway. Returns: level: the optimal level in the pyramid, pyramid: array of bounding boxes in tile units. Type Object tileCoords() Returns the coordinates of the tile (in [0, 0, w h] image coordinate system) and the texture coords associated. Returns: the tile coordinates (image coords and texture coords) × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"LensDashboard.html":{"id":"LensDashboard.html","title":"Class: LensDashboard","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashb [layerIn], camera: lime.camera, radius: 200, border: 10, dashboard: lensDashboard, visible: true }); lime.addLayer('lens', lensLayer); const btn = document.createElement('button'); btn.innerHTML = \"Click Me\"; btn.style = `position: absolute; left: 0px; top: 0px; display: inline-block; cursor: pointer; pointer-events: auto;`; lensDashboard.append(btn); Methods append(elm) Appends a HTML element to the dashboard. The element must be positioned in 'absolute' mode. Parameters: Name Type Description elm * A HTML element removeMaskFromSvgLayer(svg) Remove mask attribute from svg element Parameters: Name Type Description svg * element from which remove the mask attribute setBackgroundRenderingMode(mode) Set the background rendering mode within the lens. Parameters: Name Type Description mode RenderingMode RenderingMode.draw or RenderingMode.hide setLayerSvgAnnotation(l) Call this to set the corresponding LayerSvgAnnotation Parameters: Name Type Description l LayerSvgAnnotation setLensRenderingMode(mode) Set rendering mode within the lens. Parameters: Name Type Description mode RenderingMode RenderingMode.draw or RenderingMode.hide setMaskOnSvgLayer(svg) Set mask property on the svg element which need to be displayed with the lens Parameters: Name Type Description svg * element which need to be displayed within the lens setupCircleInteraction(circle) Setup the event listener to update lens radius by dragging lens border. Call the lens controller to update lens radius. Parameters: Name Type Description circle * lens svg border. × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"LensDashboardNavigator.html":{"id":"LensDashboardNavigator.html","title":"Class: LensDashboardNavigator","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordin reens or trackpads by converting raw pointer events (e.g., pointerdown, pointermove, pointerup) into easy-to-use gestures. Key features include: Event Management: Registers, unregisters, and broadcasts event handlers for gestures like single/double tap, hold, panning, and pinching. Gesture Recognition: Automatically detects and handles gestures such as finger taps, holds (long press), panning (drag), and pinch (zoom). Idle Detection: Detects periods of inactivity and can trigger events based on user idleness. Multiple Pointer Support: Manages multiple pointers simultaneously, supporting interactions like pinch-to-zoom. Utility Methods: Includes helper methods for tasks like calculating device pixels per millimeter (useful for different screen densities). Common use cases for PointerManager include applications that require touch gestures, such as image or map manipulation, or any interactive web application that benefits from handling complex pointer-based interactions. Classes PointerManager × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"module-PointerManager-PointerManager.html":{"id":"module-PointerManager-PointerManager.html","title":"Class: PointerManager","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:rea rManager#event:pinchEnd - When pinch gesture ends Example // Create manager and attach event handler const canvas = document.querySelector('canvas'); const pointerManager = new PointerManager(canvas); const handler = { priority: 10, fingerSingleTap: (e) =&gt; { console.log(\"SINGLE TAP at\", e.clientX, e.clientY); }, fingerHold: (e) =&gt; { console.log(\"HOLD at\", e.clientX, e.clientY); } }; pointerManager.onEvent(handler); Members &lt;static, readonly&gt; ANYPOINTER :number Constant for targeting all pointers. Type: number Methods &lt;static&gt; splitStr(str) Splits a string into an array based on whitespace. Parameters: Name Type Description str string The input string to split. Returns: An array of strings split by whitespace. Type Array.&lt;string&gt; off(eventTypes, callback [, idx]) Unregisters event handlers. Parameters: Name Type Argument Default Description eventTypes string Space-separated list of event types callback Object | function Handler to remove idx number &lt;optional&gt; ANYPOINTER Pointer index to target on(eventTypes, obj [, idx]) Registers event handlers. Parameters: Name Type Argument Default Description eventTypes string Space-separated list of event types obj Object | function Handler object or function idx number &lt;optional&gt; ANYPOINTER Pointer index to target, or ANYPOINTER for all Returns: Handler object Type Object onEvent(handler) Registers a complete event handler with multiple callbacks. Parameters: Name Type Description handler Object Handler object Properties Name Type Argument Description priority number Handler priority (higher = earlier execution) fingerHover function &lt;optional&gt; Hover callback fingerSingleTap function &lt;optional&gt; Single tap callback fingerDoubleTap function &lt;optional&gt; Double tap callback fingerHold function &lt;optional&gt; Hold callback mouseWheel function &lt;optional&gt; Mouse wheel callback panStart function &lt;optional&gt; Pan start callback panMove function &lt;optional&gt; Pan move aders['bw'] = shader; this.setShader('bw'); new Shader( [options]) Instantiates a Shader class. An object literal with Shader options can be specified. Parameters: Name Type Argument Description options Object &lt;optional&gt; An object literal describing the shader content. Properties Name Type Description samplers Array.&lt;Shader#Sampler&gt; An array of pointers to 2D textures. modes Array.&lt;string&gt; An optional array of labels that identify different shader behaviors. Methods fragShaderSrc(gl) Gets the fragment shader script. This is a virtual function and MUST be redefined in derived classes. Parameters: Name Type Description gl * Thegl context. Returns: The vertex shader script. Type string setMode(mode) Sets the current mode of the shader Parameters: Name Type Description mode string The mode identifier setUniform(name, value) Sets the value of a uniform variable. Parameters: Name Type Description name string The name of the uniform variable. value * The value to assign. vertShaderSrc(gl) Gets the vertex shader script. By default it only applies the view matrix and passes the texture coordinates to the fragment shader. Parameters: Name Type Description gl * Thegl context. Returns: The vertex shader script. Type string Type Definitions Sampler A reference to a 2D texture. Type: Object Properties: Name Type Description id number A sampler unique identifier. name string The sampler name (the texture reference name in the shader program). label string used for menu samplers array array of rasters {id:, type: } color, normals, etc. * samplers: array of rasters {id:, type: } color, normals, etc. bind: false will not used in preparegl load: false will not be loaded from raster both options are used in neural where the coefficients are loaded, but used by tf uniforms: array type = &lt;vec4|vec3|vec2|float|int&gt;, needsUpdate controls when updated in gl, size is unused, value is and array or a float, we also want to support interpolation: source (value is the target), start, end are the timing (same as camera interpolation) × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"ShaderBRDF.html":{"id":"ShaderBRDF.html","title":"Class: ShaderBRDF","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: ShaderBRDF ShaderBRDF new ShaderBRDF(options) Parameters: Name Type Description options object mode: default is color, can be [color, diffuse, specular, normals] color implements ward × Search results Close Documentation generated by JSDoc 3.6.7 on 20 . The color of each fragment is cout=c2 'mean' calculates the average color of the two textures. The color of each fragment is cout=(c1+c2)/2.0 'diff' calculates the difference between the color of the textures. Color of each fragment is cout=c2.rgb-c1.rgb Extends Shader. new ShaderCombiner( [options]) Instantiates a ShaderCombiner class. An object literal with ShaderCombiner options can be specified. Parameters: Name Type Argument Description options Object &lt;optional&gt; An object literal with options that inherits from Shader. × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"ShaderNeural.html":{"id":"ShaderNeural.html","title":"Class: ShaderNeural","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:up
