ch volume. cleanText boolean &lt;optional&gt; true Whether to clean the text before speech synthesis. voiceSelected number &lt;optional&gt; -1 The index of the selected voice. Methods activate() Activates the TextToSpeechPlayer. &lt;async&gt; initialize() Initializes the TextToSpeechPlayer by loading the voice and checking offline capability. Returns: Type Promise.&lt;void&gt; mute(enable) Mutes or unmutes the audio playback. Parameters: Name Type Description enable boolean True to mute, false to unmute. pauseSpeaking(enable) Pauses or resumes the current speech synthesis. Parameters: Name Type Description enable boolean True to pause, false to resume. &lt;async&gt; speakText(text) Speaks the provided text using speech synthesis. Parameters: Name Type Description text string The text to speak. Returns: Type Promise.&lt;void&gt; stopSpeaking() Stops the current speech synthesis. × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"Transform.html":{"id":"Transform.html","title":"Class: Transform","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: Transform Transform The class Transform implements a 2D affine map to convert coordinates between two systems. The map is internally represented by four values: x the x-component of the translation vector y the y-component of the translation vector a the rotation angle around the z-axis (in degrees) z the scale factor A transformation between a point P to P' is defined by P' = z*rot(a)*P + t where z is the scale factor, a is the rotation angle, and t(x,y) is the translation vector. The class implements a set of geometric transformations useful to position the camera, create animations, etc... new Transform( [options]) Instantiates a Transform object. Parameters: Name Type Argument Description options Object &lt;optional&gt; An object literal with Transform parameters. Properties Name Type Default Description x number 0 The x-component of the translation vector. y number 0 The y-component of the translation vector. a number 0 The rotation angle (in degrees). z number 1 The scale factor. t time 0 The current time. Methods &lt;static&gt; interpolate(source, target, time, easing) Computes the interpolated transform at time time between source and target Parameters: Name Type Description source Transform The source transform. target Transform The target transform. time time The time at which to compute the interpolation. easing Transform#Easing The easing function. Returns: The interpolated transform. Type Transform &lt;static&gt; normalizeAngle(a) Maps an angle a to range from 0 to 360 degrees. Parameters: Name Type Description a number The angle (in degrees). Returns: The normalized angle. Type number &lt;static&gt; rotate(x, y, a) Computes the rotation of a point P(x,y) by an angle a around the z-axis to get P'(x',y'). Parameters: Name Type Description x * x-coordinate of the point P. y * y-coordinate of the point P. a * The rotation angle (in degrees) Returns: The point P'. Type Object apply(x, y) Applies this Transform to a point P(x,y) to get P'(x',y'). Parameters: Name Type Description x number x-coordinate of the point P. y number y-coordinate of the point P. Returns: The point P'. Type Object compose(transform) Composes (multiplies) this Transform with an other transform. Parameters: Name Type Description transform Transform Returns: The result of the composition. Type Transform copy() Gets a copy of this Transform. Returns: The copy of the Transform. Type Transform getInverseBox(viewport) Gets the bounding box (in image coordinate space) of the vieport. The viewport y-axis points up. The image and screen transform has y pointing down. Parameters: Name Type Description viewport Viewport Returns: The bounding box. Type BoundingBox inverse() Computes the inverse of this Transform. Returns: The inverse Transform. Type Transform projectionMatrix(viewport) Combines this Transform with the viewport to get the WebGL projection matrix. Parameters: Name Type Description viewport Viewport The viewport. Returns: The result. Type Array.&lt;number&gt; sceneToViewportCoords(viewport, p) Transforms the point p from scene (0 at image center) to [0,wh] . Parameters: Name Type Description viewport Viewport The viewport. p APoint The point in scene (0,0 at image center) Returns: The point in range [0..w-1,0..h-1] Type APoint transformBox(lbox) Applyes this Transform to a bounding box. Parameters: Name Type Description lbox BoundingBox Returns: The result. Type BoundingBox viewportToSceneCoords(viewport, p) Transforms the point p from [0,wh] to scene (0 at image center). Parameters: Name Type Description viewport Viewport The viewport. p APoint The point in range [0..w-1,0..h-1] Returns: The point in scene (0,0 at image center) Type APoint Type Definitions Easing The type Easing defines the function that regulates the movement of the camera Type: 'linear' | 'ease-out' | 'ease-in-out' × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"UIBasic.html":{"id":"UIBasic.html","title":"Class: UIBasic","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:readyLayerMaskedImage#event:updateLayerNeuralRTI#event:readyLayerNeuralRTI#event:updateLayerRTI#event:readyLayerRTI#event:updateLayerSvgAnnotation#event:readyLayerSvgAnnotation#event:updateLayout#event:readyLayout#event:updateSizeUIDialog#event:closed Howto Getting started with OpenLIME Global RenderingModesimplifysmoothsmoothToPathtaskCallback Class: UIBasic UIBasic UIBasic is a flexible and easy-to-use class that implements a complete user interface to bind to the viewer The interface is associated with a CSS file (skin.css) that defines the style of the HTML DOM and a graphic file (skin.svg) that specifies the geometric characteristics of the tool buttons. The class provides a set of default ready-to-use tools (called actions): home resets the camera. fullscreen enables the fullscreen mode. layers displays the layer menu. zoomin performs a camera zoom-in. zoomout performs a camera zoom-out. rotate rotates the camera around the z-axis (by 45-degs steps). light enables light manipulation. help displays a help dialog box. In the following example a UIBasic interface is created and binded to the lime viewer. The light action is disabled, and the zoomin and zoomout actions are enabled. // Creates an User Interface const ui = new OpenLIME.UIBasic(lime); // Removes light from the toolbar ui.actions.light.display=false; // Adds zoomin and zoomout to the toolbar ui.actions.zoomin.display=true; ui.actions.zoomout.display=true; new UIBasic(viewer [, options]) Instantiates a UIBasic object. Parameters: Name Type Argument Description viewer Viewer The OpenLIME viewer. options Object &lt;optional&gt; An object literal with UIBasic parameters. Properties Name Type Default Description skin string 'skin/skin.svg' The file name of the vector image defining the tool buttons. autofit bool true Whether the initial position of the camera is set to fit the scene model. priority number 0 Higher priority controllers are invoked first. actions Object An Object of UIBasic#Action. A set of default actions are ready to be used. pixelSize number Spatial resolution: physical size represented by a single pixel in mm attribution string Some information related to data attribution or credits. menu Array.&lt;UIBasic#MenuEntry&gt; The interface menu structure. enableTooltip bool true Whether to enable tool button tooltip. showLightDirections bool false Whether to draw light direction vectors. Type Definitions Action An Action describes the behaviour of a tool button. Type: Object Properties: Name Type Description title string The nameof the action. display bool Whether to show the action in the toolbar. key string The shortcut key. task callback The callback executed by the action. Action A MenuEntry describes an entry for the menu. Type: Object Properties: Name Type Description title string The menu title. section string The section title. html string A HTML text. task callback The callback executed by the action. × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"UIDialog.html":{"id":"UIDialog.html","title":"Class: UIDialog","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUIDialogViewer Events Camera#event:updateCanvas#event:readyCanvas#event:updateCanvas#event:updateSizeLayer#event:readyLayer#event:updateLayerAnnotation#event:readyLayerAnnotation#event:updateLayerAnnotationImage#event:readyLayerAnnotationImage#event:updateLayerBRDF#event:readyLayerBRDF#event:updateLayerCombiner#event:readyLayerCombiner#event:updateLayerDstretch#event:readyLayerDstretch#event:updateLayerImage#event:readyLayerImage#event:updateLayerLens#event:readyLayerLens#event:updateLayerMaskedImage#event:re  WebGL context and takes care of the content redrawing when needed. Viewer is the main class of the OpenLIME framework. It allows access to all the internal structures that make up the system. Parameters: Name Type Argument Description div HTMLElement | string A DOM element or a selector (es. '#openlime' or '.openlime'). options Object &lt;optional&gt; An object literal describing the viewer content. Properties Name Type Default Description background color CSS style for background (it overwrites CSS if present). autofit bool true Whether the initial position of the camera is set to fit the scene model. Methods addController(controller) Adds a device event controller to the viewer. Parameters: Name Type Description controller Controller An OpenLIME controller. addLayer(id, layer) Adds the given layer to the Viewer. Parameters: Name Type Description id string A label to identify the layer. layer Layer An OpenLIME Layer object. redraw() Schedules a redrawing. removeLayer(layer) Remove the given layer from the Viewer. Parameters: Name Type Description layer Layer | string An OpenLIME Layer or a Layer identifier. × Search results Close Documentation generated by JSDoc 3.6.7 on 2024-11-01T12:16:49+00:00 using the DocStrap template. "},"tutorial-getting-started.html":{"id":"tutorial-getting-started.html","title":"Tutorial: Getting started with OpenLIME","body":" Documentation Namespaces Cache Modules PointerManager Classes AnnotationAudioPlayerBoundingBoxCameraCanvasColorColormapColormapLegendControllerController2DControllerFocusContextControllerLensControllerPanZoomCoordinateSystemDraggableEditorSvgAnnotationFocusContextLayerLayerAnnotationLayerAnnotationImageLayerBRDFLayerCombinerLayerDstretchLayerImageLayerLensLayerMaskedImageLayerNeuralRTILayerRTILayerSvgAnnotationLayoutLayoutTilesLensDashboardLensDashboardNavigatorLensDashboardNavigatorRadialPointerManager~PointerManagerRasterShaderShaderBRDFShaderCombinerShaderNeuralShaderRTISkinTextToSpeechPlayerTransformUIBasicUID
